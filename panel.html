<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interrail | Panel</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;800&display=swap" rel="stylesheet">

    <script src="https://unpkg.com/lucide@latest"></script>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/themes/dark.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://npmcdn.com/flatpickr/dist/l10n/es.js"></script> <style>
        /* =========================================
           VARIABLES Y DISEÑO BASE AWWWARDS
           ========================================= */
        :root {
            --bg-color: #050505;
            --surface: rgba(20, 20, 20, 0.6);
            --surface-hover: rgba(30, 30, 30, 0.8);
            --primary: #ffffff;
            --text-muted: #888888;
            --accent: #ff4d4d;
            --success: #4dff4d;
            --border-subtle: rgba(255, 255, 255, 0.08);
            --transition: 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Sora', sans-serif; }

        body {
            background-color: var(--bg-color);
            color: var(--primary);
            min-height: 100vh;
            overflow-x: hidden;
            /* Efecto de luz difusa en el fondo */
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(255, 255, 255, 0.03), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(255, 255, 255, 0.02), transparent 25%);
        }

        /* Pantalla de carga (Seguridad) */
        #page-loader {
            position: fixed; inset: 0; background: var(--bg-color); z-index: 9999;
            display: flex; justify-content: center; align-items: center; transition: opacity 0.5s ease;
        }

        /* =========================================
           NAVEGACIÓN (GLASSSMORPHISM)
           ========================================= */
        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 1.2rem 5%;
            background: rgba(5, 5, 5, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-subtle);
            position: sticky; top: 0; z-index: 100;
        }

        .logo { font-weight: 800; font-size: 1.5rem; letter-spacing: -1px; display: flex; align-items: center; gap: 10px; }
        .user-menu { display: flex; align-items: center; gap: 2rem; }
        .user-name { font-weight: 300; color: var(--text-muted); font-size: 0.9rem; }
        
        .btn-logout {
            background: transparent; color: var(--text-muted); border: none;
            display: flex; align-items: center; gap: 8px; cursor: pointer; transition: var(--transition);
        }
        .btn-logout:hover { color: var(--accent); }

        /* =========================================
           GRID Y TARJETAS DE VIAJE
           ========================================= */
        main { padding: 4rem 5%; max-width: 1400px; margin: 0 auto; min-height: 80vh; }
        
        .header-section { margin-bottom: 3.5rem; }
        .header-section h1 { font-size: 3rem; font-weight: 800; letter-spacing: -1px; }
        .header-section p { color: var(--text-muted); font-weight: 300; font-size: 1.1rem; margin-top: 0.5rem; }

        .trips-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 2rem;
        }

        /* Animación en cascada para las tarjetas */
        @keyframes fadeUpCard {
            from { opacity: 0; transform: translateY(30px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* Tarjeta Base */
        .trip-card {
            background: var(--surface);
            border: 1px solid var(--border-subtle);
            border-radius: 20px; padding: 2rem;
            position: relative; overflow: hidden;
            backdrop-filter: blur(10px);
            min-height: 220px;
            display: flex; flex-direction: column; justify-content: space-between;
            transition: var(--transition);
            animation: fadeUpCard 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0; /* Empieza oculta para la animación */
        }

        /* Tarjeta Especial: Añadir Viaje */
        .card-add {
            border: 1px dashed rgba(255, 255, 255, 0.2); background: transparent;
            cursor: pointer; align-items: center; justify-content: center; text-align: center;
        }
        .card-add:hover {
            border-color: var(--primary); background: rgba(255, 255, 255, 0.02); transform: translateY(-5px);
        }
        .card-add i { color: var(--text-muted); transition: var(--transition); margin-bottom: 1rem; }
        .card-add:hover i { color: var(--primary); transform: scale(1.1) rotate(90deg); }

        /* Tarjetas Desbloqueadas */
        .trip-card.unlocked:hover {
            border-color: rgba(255, 255, 255, 0.3); transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.4); cursor: pointer;
            background: var(--surface-hover);
        }

        /* Tarjetas Bloqueadas (Premium Blur) */
        .trip-card.locked { border-color: transparent; }
        .trip-card.locked .card-content { filter: blur(6px); opacity: 0.4; transition: var(--transition); pointer-events: none; }
        .locked-overlay {
            position: absolute; inset: 0; background: rgba(5, 5, 5, 0.5);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            opacity: 0.8; transition: var(--transition); z-index: 10;
        }
        .trip-card.locked:hover .card-content { filter: blur(8px); opacity: 0.2; }
        .trip-card.locked:hover .locked-overlay { opacity: 1; background: rgba(5, 5, 5, 0.7); }
        
        .btn-request {
            background: var(--primary); color: var(--bg-color); border: none;
            padding: 0.8rem 1.8rem; border-radius: 30px; font-weight: 600; font-size: 0.9rem;
            cursor: pointer; margin-top: 1rem; transition: all 0.3s ease;
            display: flex; align-items: center; gap: 8px;
        }
        .btn-request:hover { transform: scale(0.95); box-shadow: 0 0 20px rgba(255,255,255,0.2); }

        /* Etiquetas de Rol */
        .role-badge {
            position: absolute; top: 1.5rem; right: 1.5rem; font-size: 0.65rem;
            padding: 0.4rem 0.8rem; border-radius: 20px; font-weight: 600;
            background: rgba(255, 255, 255, 0.1); color: var(--primary);
            text-transform: uppercase; letter-spacing: 1px; border: 1px solid var(--border-subtle);
        }

        /* =========================================
           MODAL Y FORMULARIOS (DISEÑO LIMPIO)
           ========================================= */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(10px);
            z-index: 1000; display: flex; justify-content: center; align-items: center;
            opacity: 0; pointer-events: none; transition: var(--transition);
        }
        .modal-overlay.active { opacity: 1; pointer-events: all; }

        .modal-content {
            background: #111; border: 1px solid var(--border-subtle); padding: 3rem;
            border-radius: 24px; width: 100%; max-width: 500px;
            transform: translateY(40px) scale(0.95); transition: var(--transition);
        }
        .modal-overlay.active .modal-content { transform: translateY(0) scale(1); }

        .modal-content h2 { font-size: 2rem; font-weight: 600; margin-bottom: 2rem; letter-spacing: -1px; }
        
        .input-group { margin-bottom: 1.8rem; }
        .input-group label { display: block; color: var(--text-muted); font-size: 0.85rem; margin-bottom: 0.8rem; }
        .input-group input {
            width: 100%; padding: 1.2rem; background: rgba(255,255,255,0.03);
            border: 1px solid var(--border-subtle); color: white; border-radius: 12px;
            font-size: 1rem; outline: none; transition: border-color 0.3s;
        }
        .input-group input:focus { border-color: var(--primary); background: rgba(255,255,255,0.05); }
        
        .modal-actions { display: flex; gap: 1rem; margin-top: 2.5rem; }
        .btn-cancel { flex: 1; padding: 1.2rem; background: transparent; border: 1px solid var(--border-subtle); color: white; border-radius: 12px; cursor: pointer; font-weight: 600; transition: background 0.3s; }
        .btn-cancel:hover { background: rgba(255,255,255,0.05); }
        .btn-submit { flex: 1; padding: 1.2rem; background: var(--primary); border: none; color: var(--bg-color); border-radius: 12px; font-weight: 600; cursor: pointer; transition: transform 0.2s; }
        .btn-submit:hover { transform: scale(0.98); }

        /* Ajustes de Flatpickr para Modo Oscuro Awwwards */
        .flatpickr-calendar { background: #1a1a1a !important; border: 1px solid var(--border-subtle) !important; box-shadow: 0 20px 50px rgba(0,0,0,0.8) !important; font-family: 'Sora', sans-serif !important; border-radius: 16px !important; }
        .flatpickr-day.selected, .flatpickr-day.startRange, .flatpickr-day.endRange, .flatpickr-day.selected.inRange, .flatpickr-day.startRange.inRange, .flatpickr-day.endRange.inRange, .flatpickr-day.selected:focus, .flatpickr-day.startRange:focus, .flatpickr-day.endRange:focus, .flatpickr-day.selected:hover, .flatpickr-day.startRange:hover, .flatpickr-day.endRange:hover, .flatpickr-day.selected.prevMonthDay, .flatpickr-day.startRange.prevMonthDay, .flatpickr-day.endRange.prevMonthDay, .flatpickr-day.selected.nextMonthDay, .flatpickr-day.startRange.nextMonthDay, .flatpickr-day.endRange.nextMonthDay { background: var(--primary) !important; color: var(--bg-color) !important; border-color: var(--primary) !important; font-weight: 600; }
        .flatpickr-day.inRange { background: rgba(255,255,255,0.05) !important; border-color: transparent !important; box-shadow: none !important; }
        
        /* =========================================
           SISTEMA DE TOASTS (NOTIFICACIONES)
           ========================================= */
        #toast-container { position: fixed; bottom: 30px; right: 30px; z-index: 2000; display: flex; flex-direction: column; gap: 10px; }
        .toast {
            background: rgba(20,20,20,0.9); backdrop-filter: blur(10px); border: 1px solid var(--border-subtle);
            color: white; padding: 1rem 1.5rem; border-radius: 12px; display: flex; align-items: center; gap: 12px;
            font-size: 0.9rem; font-weight: 300; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            animation: slideInToast 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        @keyframes slideInToast { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes slideOutToast { from { transform: translateX(0); opacity: 1; } to { transform: translateX(100%); opacity: 0; } }
    </style>
</head>
<body>

    <div id="page-loader">
        <i data-lucide="compass" style="width: 40px; height: 40px; animation: spin 2s linear infinite; color: white;"></i>
    </div>

    <nav>
        <div class="logo">
            <i data-lucide="map" style="width: 24px; color: var(--primary);"></i>
            Interrail.
        </div>
        <div class="user-menu">
            <span class="user-name" id="display-user-name">Verificando...</span>
            <button class="btn-logout" id="btn-logout">
                <i data-lucide="log-out" style="width: 16px;"></i> Salir
            </button>
        </div>
    </nav>

    <main>
        <div class="header-section">
            <h1>Tus Viajes</h1>
            <p>Selecciona tu destino o únete a la aventura de otro grupo.</p>
        </div>

        <div class="trips-grid" id="trips-container">
            <div class="trip-card card-add" id="btn-open-modal" style="--i: 0;">
                <i data-lucide="plus" style="width: 48px; height: 48px;"></i>
                <h3 style="font-weight: 600;">Planear nueva ruta</h3>
            </div>
            </div>
    </main>

    <div class="modal-overlay" id="create-modal">
        <div class="modal-content">
            <h2>Crear Viaje</h2>
            <form id="create-trip-form">
                <div class="input-group">
                    <label>Nombre de la ruta o grupo</label>
                    <input type="text" id="trip-name" required placeholder="Ej. Ruta Balcanes 26">
                </div>
                <div class="input-group">
                    <label>Fechas de la aventura (Inicio - Fin)</label>
                    <input type="text" id="trip-range" required placeholder="Selecciona en el calendario" readonly>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn-cancel" id="btn-close-modal">Cancelar</button>
                    <button type="submit" class="btn-submit">Empezar a planear</button>
                </div>
            </form>
        </div>
    </div>

    <div id="toast-container"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // 1. CONFIGURACIÓN FIREBASE (Tus datos)
        const firebaseConfig = {
            apiKey: "AIzaSyDRkUJnDLzknFz3KOnPEm4UFsgf6R4z1Uk",
            authDomain: "interra26-22ecd.firebaseapp.com",
            projectId: "interra26-22ecd",
            storageBucket: "interra26-22ecd.firebasestorage.app",
            messagingSenderId: "960505222050",
            appId: "1:960505222050:web:a9943c6fec9532141f98fb"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUser = null;
        // TU MODO DIOS. (Asegúrate de poner tu correo real de registro)
        const SUPERADMIN_EMAIL = "tu_correo@gmail.com"; 

        // 2. SISTEMA DE NOTIFICACIONES (TOASTS) PRO
        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'toast';
            
            // Icono dinámico según tipo
            const icon = type === 'success' ? '<i data-lucide="check-circle" style="color: var(--success); width: 20px;"></i>' : '<i data-lucide="info" style="color: var(--primary); width: 20px;"></i>';
            
            toast.innerHTML = `${icon} <span>${message}</span>`;
            container.appendChild(toast);
            lucide.createIcons();

            // Desaparecer a los 3.5 segundos
            setTimeout(() => {
                toast.style.animation = 'slideOutToast 0.4s forwards';
                setTimeout(() => toast.remove(), 400); // Limpiar DOM
            }, 3500);
        }

        // 3. INICIALIZAR CALENDARIO (FLATPICKR)
        let selectedDatesArray = [];
        const rangePicker = flatpickr("#trip-range", {
            mode: "range",
            minDate: "today", // Bloquea el pasado
            dateFormat: "d/m/Y", // Formato europeo
            locale: "es", // Idioma español
            showMonths: 1, // Puedes poner 2 si quieres que se vean dos meses a la vez en PC
            onChange: function(selectedDates) {
                selectedDatesArray = selectedDates; // Guardamos las fechas exactas seleccionadas
            }
        });

        // 4. EL GUARDIÁN DE RUTAS
        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                document.getElementById('display-user-name').innerText = user.displayName || user.email.split('@')[0];
                
                // Animación suave de entrada
                document.getElementById('page-loader').style.opacity = '0';
                setTimeout(() => document.getElementById('page-loader').style.display = 'none', 500);
                
                loadTrips();
            } else {
                window.location.href = 'index.html'; // Expulsión si no hay sesión
            }
        });

        // Salir
        document.getElementById('btn-logout').addEventListener('click', () => {
            signOut(auth).then(() => window.location.href = 'index.html');
        });

        // 5. CARGAR VIAJES CON LÓGICA DE ROLES
        async function loadTrips() {
            const container = document.getElementById('trips-container');
            const addBtn = container.firstElementChild; // Guardamos el botón "+"
            container.innerHTML = '';
            container.appendChild(addBtn);

            try {
                const querySnapshot = await getDocs(collection(db, "viajes"));
                let index = 1; // Para la animación en cascada

                querySnapshot.forEach((docSnap) => {
                    const trip = docSnap.data();
                    const tripId = docSnap.id;
                    
                    const miembros = trip.miembros || {}; 
                    const isSuperAdmin = currentUser.email === SUPERADMIN_EMAIL;
                    const userRoleEnViaje = miembros[currentUser.uid]; 
                    const tieneAcceso = userRoleEnViaje || isSuperAdmin;
                    
                    const card = document.createElement('div');
                    card.className = `trip-card ${tieneAcceso ? 'unlocked' : 'locked'}`;
                    card.style.setProperty('--i', index); // Retraso de animación
                    index++;
                    
                    // Diseño del Badge
                    let badgeHTML = '';
                    if (isSuperAdmin) {
                        badgeHTML = `<span class="role-badge" style="background: var(--accent); border-color: var(--accent); color: white;">Nivel Dios</span>`;
                    } else if (userRoleEnViaje) {
                        badgeHTML = `<span class="role-badge"><i data-lucide="user" style="width:10px; display:inline; margin-right:4px;"></i>${userRoleEnViaje.replace('-', ' ')}</span>`;
                    }

                    // Formato de fechas para enseñar (si existen)
                    const fechaTxt = trip.fechaInicio && trip.fechaFin ? `${trip.fechaInicio} — ${trip.fechaFin}` : 'Fechas por definir';

                    card.innerHTML = `
                        ${badgeHTML}
                        <div class="card-content">
                            <h2 style="font-size: 1.6rem; margin-bottom: 0.8rem; font-weight: 600;">${trip.nombre}</h2>
                            <p style="color: var(--text-muted); font-size: 0.9rem; display: flex; align-items: center; gap: 6px;">
                                <i data-lucide="calendar" style="width:16px;"></i>
                                ${fechaTxt}
                            </p>
                        </div>
                        ${!tieneAcceso ? `
                        <div class="locked-overlay">
                            <i data-lucide="lock" style="color: white; margin-bottom: 15px; width: 32px; height: 32px;"></i>
                            <button class="btn-request" onclick="solicitarAccesoGlobal('${tripId}', '${trip.nombre}')">
                                Solicitar Acceso
                            </button>
                        </div>` : ''}
                    `;

                    // Clic en viaje desbloqueado
                    if (tieneAcceso) {
                        card.addEventListener('click', (e) => {
                            // Si clica en el badge, que no navegue
                            if(!e.target.closest('.role-badge')) {
                                console.log("Navegando al viaje:", tripId);
                                // Aquí irá: window.location.href = `viaje.html?id=${tripId}`;
                            }
                        });
                    }

                    container.appendChild(card);
                });
                lucide.createIcons();
            } catch (error) {
                console.error("Error al cargar viajes:", error);
                showToast("Error de conexión con la base de datos.", "error");
            }
        }

        // 6. LÓGICA DEL MODAL DE CREACIÓN
        const modal = document.getElementById('create-modal');
        document.getElementById('btn-open-modal').addEventListener('click', () => modal.classList.add('active'));
        document.getElementById('btn-close-modal').addEventListener('click', () => {
            modal.classList.remove('active');
            document.getElementById('create-trip-form').reset();
            rangePicker.clear();
        });

        document.getElementById('create-trip-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // Validación del calendario
            if (selectedDatesArray.length < 2) {
                showToast("Debes seleccionar inicio y fin en el calendario.", "error");
                return;
            }

            const btnSubmit = e.target.querySelector('.btn-submit');
            btnSubmit.innerText = 'Planificando...';
            btnSubmit.style.opacity = '0.7';

            // Formatear fechas para la DB (Guardamos como DD/MM/YYYY)
            const formatoDB = (dateObj) => dateObj.toLocaleDateString('es-ES', { day: '2-digit', month: '2-digit', year: 'numeric' });

            const nuevoViaje = {
                nombre: document.getElementById('trip-name').value,
                fechaInicio: formatoDB(selectedDatesArray[0]),
                fechaFin: formatoDB(selectedDatesArray[1]),
                creadoPor: currentUser.uid,
                miembros: {
                    [currentUser.uid]: "admin-grupo"
                },
                timestamp: new Date() // Para ordenar luego si queremos
            };

            try {
                await addDoc(collection(db, "viajes"), nuevoViaje);
                modal.classList.remove('active');
                e.target.reset();
                rangePicker.clear();
                showToast("¡Viaje creado con éxito!");
                
                // Recargar el panel con estilo
                setTimeout(loadTrips, 300);
            } catch (error) {
                console.error("Error:", error);
                showToast("Hubo un error al crear la ruta.", "error");
            } finally {
                btnSubmit.innerText = 'Empezar a planear';
                btnSubmit.style.opacity = '1';
            }
        });

        // 7. FUNCIÓN GLOBAL PARA SOLICITAR ACCESO
        window.solicitarAccesoGlobal = function(tripId, tripName) {
            // Impedimos que el evento suba y clique la tarjeta por error
            event.stopPropagation();
            
            // TODO: En el siguiente paso, aquí guardaremos la petición en Firebase.
            // Por ahora, activamos nuestro elegante Toast.
            showToast(`Petición enviada al admin de "${tripName}".`);
            
            // Cambiar visualmente el botón para dar feedback inmediato
            const btn = event.currentTarget;
            btn.innerHTML = `<i data-lucide="clock" style="width:16px;"></i> Pendiente`;
            btn.style.background = "transparent";
            btn.style.border = "1px solid var(--primary)";
            btn.disabled = true;
            lucide.createIcons();
        }

        // Iniciar iconos al cargar la página
        lucide.createIcons();
    </script>
    <style>@keyframes spin { 100% { transform: rotate(360deg); } }</style>
</body>
</html>
