<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interrail App | Acceso</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;800&display=swap" rel="stylesheet">

    <style>
        /* =========================================
           VARIABLES Y RESET (Sin cambios, estilo Awwwards)
           ========================================= */
        :root {
            --bg-color: #0a0a0a;
            --surface: #171717;
            --primary: #ffffff;
            --text-muted: #888888;
            --accent: #ff4d4d;
            --success: #4dff4d;
            --transition: 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Sora', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background-image: radial-gradient(circle at 50% -20%, #2a2a2a 0%, var(--bg-color) 50%);
        }

        /* =========================================
           CONTENEDOR PRINCIPAL Y ANIMACIONES
           ========================================= */
        .auth-container {
            position: relative;
            width: 100%;
            max-width: 400px;
            padding: 2rem;
            perspective: 1000px;
        }

        .header-text {
            text-align: center;
            margin-bottom: 3rem;
            animation: fadeDown 1s var(--transition) forwards;
            opacity: 0;
            transform: translateY(-20px);
        }

        .header-text h1 {
            font-weight: 800;
            font-size: 2.5rem;
            letter-spacing: -1px;
        }

        .header-text p {
            color: var(--text-muted);
            font-weight: 300;
            margin-top: 0.5rem;
        }

        .forms-wrapper {
            position: relative;
            min-height: 350px;
        }

        .form-box {
            position: absolute;
            width: 100%;
            top: 0;
            left: 0;
            transition: var(--transition);
            opacity: 0;
            pointer-events: none;
            transform: translateX(30px);
        }

        .form-box.active {
            opacity: 1;
            pointer-events: all;
            transform: translateX(0);
        }

        .form-box.slide-left {
            transform: translateX(-30px);
        }

        /* =========================================
           ESTILOS DE FORMULARIO
           ========================================= */
        .input-group {
            margin-bottom: 1.5rem;
            position: relative;
        }

        .input-group input {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 1px solid #333;
            color: var(--primary);
            font-size: 1rem;
            padding: 0.8rem 0;
            transition: border-color 0.3s ease;
            outline: none;
        }

        .input-group input:focus {
            border-bottom-color: var(--primary);
        }

        .input-group label {
            position: absolute;
            top: 0.8rem;
            left: 0;
            color: var(--text-muted);
            font-weight: 300;
            pointer-events: none;
            transition: 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .input-group input:focus ~ label,
        .input-group input:valid ~ label {
            top: -12px;
            font-size: 0.75rem;
            color: var(--primary);
        }

        button.submit-btn {
            width: 100%;
            padding: 1rem;
            background: var(--primary);
            color: var(--bg-color);
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 1rem;
            transition: transform 0.2s ease, opacity 0.2s ease;
        }

        button.submit-btn:hover {
            transform: scale(0.98);
            opacity: 0.9;
        }

        .toggle-text {
            text-align: center;
            margin-top: 2rem;
            color: var(--text-muted);
            font-size: 0.9rem;
            font-weight: 300;
        }

        .toggle-text span {
            color: var(--primary);
            cursor: pointer;
            font-weight: 600;
            transition: opacity 0.3s ease;
        }

        .toggle-text span:hover {
            opacity: 0.7;
        }

        .message-box {
            margin-top: 1rem;
            text-align: center;
            font-size: 0.85rem;
            min-height: 20px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        @keyframes fadeDown {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>

    <div class="auth-container">
        <div class="header-text">
            <h1>Interrail.</h1>
            <p>Centraliza tu viaje.</p>
        </div>

        <div class="forms-wrapper">
            <form id="login-form" class="form-box active">
                <div class="input-group">
                    <input type="email" id="login-email" required>
                    <label>Correo electrónico</label>
                </div>
                <div class="input-group">
                    <input type="password" id="login-password" required>
                    <label>Contraseña</label>
                </div>
                <button type="submit" class="submit-btn" id="login-btn">Entrar</button>
                <div class="message-box" id="login-msg"></div>
                <p class="toggle-text">¿No tienes cuenta? <span id="btn-to-register">Regístrate</span></p>
            </form>

            <form id="register-form" class="form-box">
                <div class="input-group">
                    <input type="text" id="register-name" required>
                    <label>Tu nombre</label>
                </div>
                <div class="input-group">
                    <input type="email" id="register-email" required>
                    <label>Correo electrónico</label>
                </div>
                <div class="input-group">
                    <input type="password" id="register-password" required minlength="6">
                    <label>Contraseña (mín. 6 caracteres)</label>
                </div>
                <button type="submit" class="submit-btn" id="register-btn">Crear cuenta</button>
                <div class="message-box" id="register-msg"></div>
                <p class="toggle-text">¿Ya tienes cuenta? <span id="btn-to-login">Inicia sesión</span></p>
            </form>
        </div>
    </div>

    <script type="module">
        /* =========================================
           1. IMPORTAR FIREBASE DESDE CDN
           ========================================= */
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, updateProfile } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        /* =========================================
           2. TU CONFIGURACIÓN DE FIREBASE
           ========================================= */
        const firebaseConfig = {
            apiKey: "AIzaSyDRkUJnDLzknFz3KOnPEm4UFsgf6R4z1Uk",
            authDomain: "interra26-22ecd.firebaseapp.com",
            projectId: "interra26-22ecd",
            storageBucket: "interra26-22ecd.firebasestorage.app",
            messagingSenderId: "960505222050",
            appId: "1:960505222050:web:a9943c6fec9532141f98fb",
            measurementId: "G-Q4WWX5TLK4"
        };

        // Inicializar Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        /* =========================================
           3. LÓGICA DE UI (ANIMACIONES AWWARDS)
           ========================================= */
        const loginForm = document.getElementById('login-form');
        const registerForm = document.getElementById('register-form');

        function toggleForms() {
            document.getElementById('login-msg').style.opacity = 0;
            document.getElementById('register-msg').style.opacity = 0;

            if (loginForm.classList.contains('active')) {
                loginForm.classList.remove('active');
                loginForm.classList.add('slide-left');
                registerForm.classList.remove('slide-left');
                registerForm.classList.add('active');
            } else {
                registerForm.classList.remove('active');
                loginForm.classList.remove('slide-left');
                loginForm.classList.add('active');
            }
        }

        document.getElementById('btn-to-register').addEventListener('click', toggleForms);
        document.getElementById('btn-to-login').addEventListener('click', toggleForms);

        /* =========================================
           4. LÓGICA DE BASE DE DATOS (AUTENTICACIÓN)
           ========================================= */
        
        // Manejo del Registro
        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const name = document.getElementById('register-name').value;
            const email = document.getElementById('register-email').value;
            const password = document.getElementById('register-password').value;
            const btn = document.getElementById('register-btn');
            const msgBox = document.getElementById('register-msg');

            btn.innerHTML = 'Procesando...';
            btn.style.opacity = '0.7';

            try {
                // Crear usuario en Firebase
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                
                // Añadir el nombre al perfil del usuario
                await updateProfile(userCredential.user, { displayName: name });

                btn.innerHTML = 'Crear cuenta';
                btn.style.opacity = '1';
                msgBox.style.color = 'var(--success)';
                msgBox.innerText = '¡Registro exitoso! Ya puedes iniciar sesión.';
                msgBox.style.opacity = 1;
                
                // Vaciar formulario
                registerForm.reset();

            } catch (error) {
                btn.innerHTML = 'Crear cuenta';
                btn.style.opacity = '1';
                msgBox.style.color = 'var(--accent)'; // Rojo de error
                
                // Traducir errores comunes de Firebase
                if (error.code === 'auth/email-already-in-use') {
                    msgBox.innerText = 'Este correo ya está registrado.';
                } else if (error.code === 'auth/weak-password') {
                    msgBox.innerText = 'La contraseña es muy débil.';
                } else {
                    msgBox.innerText = error.message;
                }
                msgBox.style.opacity = 1;
            }
        });

        // Manejo del Login
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            const btn = document.getElementById('login-btn');
            const msgBox = document.getElementById('login-msg');

            btn.innerHTML = 'Entrando...';
            btn.style.opacity = '0.7';

            try {
                // Iniciar sesión en Firebase
                await signInWithEmailAndPassword(auth, email, password);

                btn.innerHTML = 'Entrar';
                btn.style.opacity = '1';
                msgBox.style.color = 'var(--success)';
                msgBox.innerText = '¡Acceso concedido!';
                msgBox.style.opacity = 1;
                
                // Aquí redirigirías al panel principal
                // setTimeout(() => { window.location.href = 'panel.html'; }, 1000);

            } catch (error) {
                btn.innerHTML = 'Entrar';
                btn.style.opacity = '1';
                msgBox.style.color = 'var(--accent)';
                msgBox.innerText = 'Correo o contraseña incorrectos.';
                msgBox.style.opacity = 1;
            }
        });
    </script>
</body>
</html>
