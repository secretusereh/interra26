<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interrail App | Acceso</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        /* =========================================
           VARIABLES Y RESET
           ========================================= */
        :root {
            --bg-color: #0a0a0a;
            --surface: #171717;
            --primary: #ffffff;
            --text-muted: #888888;
            --accent: #ff4d4d; /* Un rojo sutil para errores o acentos */
            --transition: 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Sora', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            /* Efecto de fondo radial elegante */
            background-image: radial-gradient(circle at 50% -20%, #2a2a2a 0%, var(--bg-color) 50%);
        }

        /* =========================================
           CONTENEDOR PRINCIPAL Y ANIMACIONES
           ========================================= */
        .auth-container {
            position: relative;
            width: 100%;
            max-width: 400px;
            padding: 2rem;
            perspective: 1000px;
        }

        .header-text {
            text-align: center;
            margin-bottom: 3rem;
            animation: fadeDown 1s var(--transition) forwards;
            opacity: 0;
            transform: translateY(-20px);
        }

        .header-text h1 {
            font-weight: 800;
            font-size: 2.5rem;
            letter-spacing: -1px;
        }

        .header-text p {
            color: var(--text-muted);
            font-weight: 300;
            margin-top: 0.5rem;
        }

        /* Contenedor de los formularios para efecto Slide */
        .forms-wrapper {
            position: relative;
            min-height: 350px;
        }

        .form-box {
            position: absolute;
            width: 100%;
            top: 0;
            left: 0;
            transition: var(--transition);
            opacity: 0;
            pointer-events: none;
            transform: translateX(30px);
        }

        .form-box.active {
            opacity: 1;
            pointer-events: all;
            transform: translateX(0);
        }

        .form-box.slide-left {
            transform: translateX(-30px);
        }

        /* =========================================
           ESTILOS DE FORMULARIO
           ========================================= */
        .input-group {
            margin-bottom: 1.5rem;
            position: relative;
        }

        .input-group input {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 1px solid #333;
            color: var(--primary);
            font-size: 1rem;
            padding: 0.8rem 0;
            transition: border-color 0.3s ease;
            outline: none;
        }

        .input-group input:focus {
            border-bottom-color: var(--primary);
        }

        .input-group label {
            position: absolute;
            top: 0.8rem;
            left: 0;
            color: var(--text-muted);
            font-weight: 300;
            pointer-events: none;
            transition: 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* Animación de la etiqueta al escribir o enfocar */
        .input-group input:focus ~ label,
        .input-group input:valid ~ label {
            top: -12px;
            font-size: 0.75rem;
            color: var(--primary);
        }

        button.submit-btn {
            width: 100%;
            padding: 1rem;
            background: var(--primary);
            color: var(--bg-color);
            border: none;
            border-radius: 8px;
            font-family: 'Sora', sans-serif;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 1rem;
            transition: transform 0.2s ease, opacity 0.2s ease;
        }

        button.submit-btn:hover {
            transform: scale(0.98);
            opacity: 0.9;
        }

        .toggle-text {
            text-align: center;
            margin-top: 2rem;
            color: var(--text-muted);
            font-size: 0.9rem;
            font-weight: 300;
        }

        .toggle-text span {
            color: var(--primary);
            cursor: pointer;
            font-weight: 600;
            transition: opacity 0.3s ease;
        }

        .toggle-text span:hover {
            opacity: 0.7;
        }

        /* Mensajes de error del sistema */
        .message-box {
            margin-top: 1rem;
            text-align: center;
            font-size: 0.85rem;
            min-height: 20px;
            color: var(--accent);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        /* =========================================
           KEYFRAMES
           ========================================= */
        @keyframes fadeDown {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>

    <div class="auth-container">
        <div class="header-text">
            <h1>Interrail.</h1>
            <p>Centraliza tu viaje.</p>
        </div>

        <div class="forms-wrapper">
            <form id="login-form" class="form-box active">
                <div class="input-group">
                    <input type="email" id="login-email" required>
                    <label>Correo electrónico</label>
                </div>
                <div class="input-group">
                    <input type="password" id="login-password" required>
                    <label>Contraseña</label>
                </div>
                <button type="submit" class="submit-btn" id="login-btn">Entrar</button>
                <div class="message-box" id="login-msg"></div>
                <p class="toggle-text">¿No tienes cuenta? <span onclick="toggleForms()">Regístrate</span></p>
            </form>

            <form id="register-form" class="form-box">
                <div class="input-group">
                    <input type="text" id="register-name" required>
                    <label>Tu nombre</label>
                </div>
                <div class="input-group">
                    <input type="email" id="register-email" required>
                    <label>Correo electrónico</label>
                </div>
                <div class="input-group">
                    <input type="password" id="register-password" required minlength="6">
                    <label>Contraseña (mín. 6 caracteres)</label>
                </div>
                <button type="submit" class="submit-btn" id="register-btn">Crear cuenta</button>
                <div class="message-box" id="register-msg"></div>
                <p class="toggle-text">¿Ya tienes cuenta? <span onclick="toggleForms()">Inicia sesión</span></p>
            </form>
        </div>
    </div>

    <script>
        /* =========================================
           1. CONFIGURACIÓN DE SUPABASE
           ========================================= */
        // Reemplaza estos valores con los de tu proyecto Supabase
        const SUPABASE_URL = 'TU_URL_DE_SUPABASE'; 
        const SUPABASE_ANON_KEY = 'TU_ANON_KEY_DE_SUPABASE';

        // Inicializar cliente
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        /* =========================================
           2. LÓGICA DE UI (ANIMACIONES AWWARDS)
           ========================================= */
        const loginForm = document.getElementById('login-form');
        const registerForm = document.getElementById('register-form');

        function toggleForms() {
            // Limpiar mensajes
            document.getElementById('login-msg').style.opacity = 0;
            document.getElementById('register-msg').style.opacity = 0;

            if (loginForm.classList.contains('active')) {
                // Ocultar Login, Mostrar Registro
                loginForm.classList.remove('active');
                loginForm.classList.add('slide-left');
                
                registerForm.classList.remove('slide-left');
                registerForm.classList.add('active');
            } else {
                // Ocultar Registro, Mostrar Login
                registerForm.classList.remove('active');
                
                loginForm.classList.remove('slide-left');
                loginForm.classList.add('active');
            }
        }

        /* =========================================
           3. LÓGICA DE BASE DE DATOS (AUTENTICACIÓN)
           ========================================= */
        
        // Manejo del Registro
        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault(); // Evita que la página recargue
            
            const name = document.getElementById('register-name').value;
            const email = document.getElementById('register-email').value;
            const password = document.getElementById('register-password').value;
            const btn = document.getElementById('register-btn');
            const msgBox = document.getElementById('register-msg');

            // Estado de carga fluido
            btn.innerHTML = 'Procesando...';
            btn.style.opacity = '0.7';

            // Llamada a Supabase
            const { data, error } = await supabase.auth.signUp({
                email: email,
                password: password,
                options: {
                    data: {
                        full_name: name // Guardamos el nombre en los metadatos
                    }
                }
            });

            btn.innerHTML = 'Crear cuenta';
            btn.style.opacity = '1';

            if (error) {
                msgBox.innerText = error.message;
                msgBox.style.opacity = 1;
            } else {
                msgBox.style.color = '#4dff4d'; // Verde éxito
                msgBox.innerText = '¡Registro exitoso! Revisa tu email.';
                msgBox.style.opacity = 1;
            }
        });

        // Manejo del Login
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            const btn = document.getElementById('login-btn');
            const msgBox = document.getElementById('login-msg');

            btn.innerHTML = 'Entrando...';
            btn.style.opacity = '0.7';

            const { data, error } = await supabase.auth.signInWithPassword({
                email: email,
                password: password,
            });

            btn.innerHTML = 'Entrar';
            btn.style.opacity = '1';

            if (error) {
                msgBox.innerText = 'Credenciales incorrectas.';
                msgBox.style.opacity = 1;
            } else {
                msgBox.style.color = '#4dff4d';
                msgBox.innerText = '¡Acceso concedido!';
                msgBox.style.opacity = 1;
                
                // Aquí redirigirías al panel principal
                // setTimeout(() => { window.location.href = 'panel.html'; }, 1000);
            }
        });
    </script>
</body>
</html>
