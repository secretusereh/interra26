<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title>Interra-hub | Soporte 24/7</title>
    <meta name="description" content="Centro de ayuda y soporte de Interra-hub. Resuelve tus dudas al instante con nuestro asistente IA 24/7.">
    
    <link rel="icon" type="image/png" href="interrahublogo.PNG">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        /* =========================================
           VARIABLES Y CONFIGURACIÓN BASE
           ========================================= */
        :root {
            --bg-color: #030303;
            --surface-card: #0d0d0d;
            --primary: #ffffff;
            --text-muted: #777777;
            --gold: #ffd700;
            --gold-gradient: linear-gradient(135deg, #ffd700 0%, #ffb84d 100%);
            --border-subtle: rgba(255, 255, 255, 0.06);
            --border-highlight: rgba(255, 255, 255, 0.15);
            --transition: cubic-bezier(0.16, 1, 0.3, 1) 0.5s;
        }

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: 'Sora', sans-serif; 
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            background-color: var(--bg-color);
            color: var(--primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            background-image: radial-gradient(circle at 50% -20%, rgba(255, 255, 255, 0.03), transparent 50%),
                              radial-gradient(circle at 50% 120%, rgba(255, 255, 255, 0.02), transparent 50%);
            background-attachment: fixed;
        }

        ::selection { background: var(--primary); color: #000; }

        /* =========================================
           NAVEGACIÓN DE CABECERA
           ========================================= */
        nav {
            width: 100%;
            padding: 1.5rem 5%;
            display: flex;
            justify-content: flex-start;
            align-items: center;
            position: absolute;
            top: 0; left: 0; z-index: 100;
        }
        
        .btn-back {
            background: rgba(255,255,255,0.03); color: var(--primary); border: 1px solid var(--border-subtle);
            padding: 0.6rem 1.2rem; border-radius: 30px; font-weight: 600; font-size: 0.85rem;
            cursor: pointer; transition: var(--transition); display: flex; align-items: center; gap: 8px;
            text-decoration: none; backdrop-filter: blur(10px);
        }
        .btn-back:hover { 
            background: rgba(255,255,255,0.08); 
            border-color: rgba(255,255,255,0.2); 
            transform: translateX(-3px); 
        }

        /* =========================================
           CONTENEDOR CENTRAL DE SOPORTE
           ========================================= */
        .support-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 7rem 1.5rem 4rem;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }

        .support-card {
            background: var(--surface-card);
            border: 1px solid var(--border-subtle);
            width: 100%;
            max-width: 500px;
            border-radius: 24px;
            padding: 3rem 2.5rem;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            position: relative;
            animation: slideUp 0.6s var(--transition) forwards;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .support-card::before {
            content: '';
            position: absolute;
            top: 0; left: 50%; transform: translateX(-50%);
            width: 30%; height: 2px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
        }

        .icon-wrapper {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--border-subtle);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            color: var(--primary);
        }

        .support-card h1 {
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            margin-bottom: 1rem;
        }

        .support-card p {
            color: var(--text-muted);
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 2rem;
            font-weight: 300;
        }

        .support-card p strong {
            color: var(--primary);
            font-weight: 600;
        }

        .support-action-box {
            background: rgba(255, 255, 255, 0.02);
            border: 1px dashed var(--border-subtle);
            border-radius: 16px;
            padding: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            color: rgba(255,255,255,0.9);
            font-size: 0.9rem;
            font-weight: 400;
        }

        .pulse-dot {
            width: 10px;
            height: 10px;
            background-color: #4dff4d;
            border-radius: 50%;
            box-shadow: 0 0 0 rgba(77, 255, 77, 0.4);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(77, 255, 77, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(77, 255, 77, 0); }
            100% { box-shadow: 0 0 0 0 rgba(77, 255, 77, 0); }
        }

        /* =========================================
           FOOTER
           ========================================= */
        footer {
            text-align: center;
            padding: 2.5rem;
            border-top: 1px solid var(--border-subtle);
            font-size: 0.8rem;
            color: rgba(255,255,255,0.25);
            background: #070707;
            width: 100%;
        }

        @media (max-width: 480px) {
            .support-card { padding: 2.5rem 1.5rem; }
            .support-card h1 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

    <nav>
        <a href="#" id="btn-back" class="btn-back">
            <i data-lucide="arrow-left" style="width: 16px;"></i> Volver atrás
        </a>
    </nav>

    <div class="support-container">
        <section class="support-card">
            
            <div class="icon-wrapper">
                <i data-lucide="message-square-more" style="width: 32px; height: 32px;"></i>
            </div>
            
            <h1>¿Necesitas ayuda?</h1>
            
            <p>
                Estamos aquí para ti. Tienes a tu disposición nuestro <strong>Soporte 24/7</strong> respaldado por Inteligencia Artificial y nuestro equipo de atención al cliente.
            </p>

            <div class="support-action-box">
                <div class="pulse-dot"></div>
                Usa la burbuja de chat para empezar
            </div>

        </section>
    </div>

    <footer>
        © 2026 Interra-hub · Desarrollado por <strong>Pipa Studio</strong>
    </footer>

    <!-- Lógica de Memoria Local e Iconos -->
    <script>
        // Inicializar iconos
        lucide.createIcons();

        // Lógica de Memoria Local para el botón "Volver atrás"
        document.addEventListener("DOMContentLoaded", () => {
            const backBtn = document.getElementById('btn-back');
            const referrer = document.referrer;
            
            // 1. Al cargar la página, analizamos de dónde viene el usuario
            // Si el referrer existe y NO es la propia página de soporte (para evitar bucles),
            // guardamos la URL en sessionStorage.
            if (referrer && !referrer.includes('soporte.html')) {
                sessionStorage.setItem('lastInterraPage', referrer);
            }

            // 2. Al hacer clic en el botón de retroceso
            backBtn.addEventListener('click', (e) => {
                e.preventDefault();
                
                // Recuperamos la última página guardada. Si por algún motivo no existe, 
                // o el usuario entró directo a soporte.html, lo enviamos al panel por defecto.
                const fallbackPage = 'panel.html';
                const lastPage = sessionStorage.getItem('lastInterraPage') || fallbackPage;
                
                window.location.href = lastPage;
            });
        });
    </script>

    <!-- Tidio Widget 24/7 -->
    <script src="//code.tidio.co/gfxhupr9pntygs7wjcktdwxemoht8pbu.js" async></script>
</body>
</html>
