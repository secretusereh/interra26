<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interrail | Planificador</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/themes/dark.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://npmcdn.com/flatpickr/dist/l10n/es.js"></script>

    <style>
        /* =========================================
           VARIABLES Y DISEÑO BASE
           ========================================= */
        :root {
            --bg-color: #030303;
            --surface: rgba(20, 20, 20, 0.4);
            --surface-solid: #141414;
            --primary: #ffffff;
            --text-muted: #888888;
            --accent: #ff4d4d;
            --accent-blue: #4da6ff;
            --accent-green: #4dff88;
            --success: #4dff4d;
            --border-subtle: rgba(255, 255, 255, 0.08);
            --transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Sora', sans-serif; }

        body {
            background-color: var(--bg-color); color: var(--primary); min-height: 100vh;
            background-image: radial-gradient(circle at 50% -10%, rgba(255, 255, 255, 0.05), transparent 60%);
        }

        /* Nav */
        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 1rem 5%; background: rgba(3, 3, 3, 0.8); backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-subtle); position: sticky; top: 0; z-index: 100;
        }
        .btn-back { background: transparent; color: var(--text-muted); border: none; cursor: pointer; display: flex; align-items: center; gap: 8px; font-weight: 600; transition: var(--transition); }
        .btn-back:hover { color: var(--primary); }
        .logo { font-weight: 800; font-size: 1.2rem; display: flex; align-items: center; gap: 10px; }

        /* Loader a pantalla completa */
        #page-loader {
            position: fixed; inset: 0; background: var(--bg-color); z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center; transition: opacity 0.5s ease;
        }

        /* Cabecera y Tabs */
        .trip-header { padding: 3rem 5% 1rem; max-width: 1000px; margin: 0 auto; text-align: center; }
        .trip-header h1 { font-size: 3.5rem; font-weight: 800; letter-spacing: -2px; margin-bottom: 0.5rem; }
        .trip-header p { color: var(--text-muted); font-size: 1.1rem; }

        .tabs-container {
            display: flex; justify-content: center; gap: 2rem; border-bottom: 1px solid var(--border-subtle);
            max-width: 900px; margin: 2rem auto 0; padding: 0 5%;
        }
        .tab-btn {
            background: transparent; color: var(--text-muted); border: none; font-size: 1.1rem; font-weight: 600;
            padding: 1rem 0; cursor: pointer; position: relative; transition: var(--transition);
        }
        .tab-btn.active { color: var(--primary); }
        .tab-btn.active::after {
            content: ''; position: absolute; bottom: -1px; left: 0; width: 100%; height: 2px;
            background: var(--primary); border-radius: 2px 2px 0 0;
        }

        .tab-content { display: none; animation: fadeIn 0.5s ease; padding: 3rem 5% 5rem; max-width: 900px; margin: 0 auto; }
        .tab-content.active { display: block; }

        /* =========================================
           TAB 1: ITINERARIO (TIMELINE)
           ========================================= */
        .day-container { margin-bottom: 3rem; position: relative; animation: fadeIn 0.6s ease forwards; }
        .day-header {
            display: flex; justify-content: space-between; align-items: center;
            padding-bottom: 1rem; border-bottom: 1px solid var(--border-subtle); margin-bottom: 1.5rem;
            position: sticky; top: 60px; background: var(--bg-color); z-index: 10;
        }
        .day-title { font-size: 1.8rem; font-weight: 600; display: flex; align-items: baseline; gap: 10px; }
        .day-date { font-size: 1rem; color: var(--text-muted); font-weight: 300; }
        
        .btn-add-day {
            background: rgba(255,255,255,0.05); color: var(--primary); border: 1px solid var(--border-subtle);
            padding: 0.6rem 1.2rem; border-radius: 30px; font-size: 0.85rem; font-weight: 600;
            cursor: pointer; display: flex; align-items: center; gap: 6px; transition: var(--transition);
        }
        .btn-add-day:hover { background: var(--primary); color: var(--bg-color); transform: scale(0.95); }

        .timeline-wrapper { position: relative; padding-left: 20px; }
        .timeline-wrapper::before {
            content: ''; position: absolute; left: 0; top: 10px; bottom: 0; width: 2px; background: linear-gradient(to bottom, var(--border-subtle), transparent);
        }
        .timeline-empty {
            color: var(--text-muted); font-size: 0.9rem; font-style: italic; padding: 2rem;
            border: 1px dashed var(--border-subtle); border-radius: 12px; text-align: center; margin-left: 10px;
        }

        .event-card {
            background: var(--surface); border: 1px solid var(--border-subtle); border-radius: 16px;
            padding: 1.5rem; margin-bottom: 1rem; margin-left: 15px; position: relative;
            backdrop-filter: blur(10px); display: flex; gap: 1.5rem; transition: var(--transition);
        }
        .event-card:hover { border-color: rgba(255,255,255,0.2); transform: translateX(5px); }
        .event-card::before {
            content: ''; position: absolute; left: -21px; top: 25px; width: 10px; height: 10px;
            background: var(--primary); border-radius: 50%; box-shadow: 0 0 10px var(--primary);
        }
        .event-card.type-transport::before { background: var(--accent-blue); box-shadow: 0 0 10px var(--accent-blue); }
        .event-card.type-hotel::before { background: var(--accent-green); box-shadow: 0 0 10px var(--accent-green); }
        .event-card.type-plan::before { background: var(--accent); box-shadow: 0 0 10px var(--accent); }

        .event-time { font-weight: 800; font-size: 1.2rem; min-width: 60px; }
        .event-icon { width: 40px; height: 40px; border-radius: 10px; display: flex; justify-content: center; align-items: center; background: rgba(255,255,255,0.05); }
        .event-content { flex: 1; }
        .event-title { font-size: 1.2rem; font-weight: 600; margin-bottom: 0.3rem; }
        .event-desc { color: var(--text-muted); font-size: 0.9rem; line-height: 1.5; white-space: pre-wrap;}

        .btn-delete {
            position: absolute; top: 1.5rem; right: 1.5rem; background: rgba(255,77,77,0.1); color: var(--accent);
            border: none; width: 32px; height: 32px; border-radius: 8px; cursor: pointer;
            display: flex; justify-content: center; align-items: center; opacity: 0; transition: var(--transition);
        }
        .event-card:hover .btn-delete { opacity: 1; }
        .btn-delete:hover { background: var(--accent); color: white; }

        /* =========================================
           TAB 2: USUARIOS Y SOLICITUDES
           ========================================= */
        .users-grid { display: grid; grid-template-columns: 1fr; gap: 2rem; }
        @media (min-width: 768px) { .users-grid { grid-template-columns: 1fr 1fr; } }
        
        .user-section { background: var(--surface); padding: 2rem; border-radius: 16px; border: 1px solid var(--border-subtle); }
        .user-section h3 { margin-bottom: 1.5rem; border-bottom: 1px solid var(--border-subtle); padding-bottom: 0.5rem; display: flex; align-items: center; gap: 10px; }
        
        .user-row { display: flex; justify-content: space-between; align-items: center; padding: 1rem 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .user-info { display: flex; align-items: center; gap: 10px; }
        .user-role-tag { font-size: 0.7rem; padding: 0.3rem 0.6rem; border-radius: 20px; background: rgba(255,255,255,0.1); text-transform: uppercase; letter-spacing: 1px; }
        
        .request-actions { display: flex; gap: 8px; }
        .btn-accept, .btn-deny { border: none; padding: 0.5rem; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.3s; }
        .btn-accept { background: rgba(77, 255, 77, 0.15); color: var(--success); }
        .btn-accept:hover { background: var(--success); color: var(--bg-color); }
        .btn-deny { background: rgba(255, 77, 77, 0.15); color: var(--accent); }
        .btn-deny:hover { background: var(--accent); color: white; }

        /* =========================================
           OMNI-MODAL (AÑADIR ELEMENTOS)
           ========================================= */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px);
            z-index: 1000; display: flex; justify-content: center; align-items: center;
            opacity: 0; pointer-events: none; transition: var(--transition);
        }
        .modal-overlay.active { opacity: 1; pointer-events: all; }
        
        .modal-content {
            background: var(--surface-solid); border: 1px solid var(--border-subtle); border-radius: 24px;
            width: 100%; max-width: 550px; padding: 2.5rem; transform: translateY(30px); transition: var(--transition); max-height: 90vh; overflow-y: auto;
        }
        .modal-overlay.active .modal-content { transform: translateY(0); }

        .modal-header { text-align: center; margin-bottom: 2rem; }
        .modal-header h2 { font-size: 1.8rem; font-weight: 600; }

        .type-selector { display: flex; background: rgba(255,255,255,0.03); border-radius: 12px; padding: 5px; margin-bottom: 2rem; }
        .type-btn { flex: 1; background: transparent; border: none; color: var(--text-muted); padding: 1rem; border-radius: 8px; font-weight: 600; cursor: pointer; transition: var(--transition); display: flex; align-items: center; justify-content: center; gap: 8px; }
        .type-btn.active { background: var(--primary); color: var(--bg-color); }

        .form-section { display: none; animation: fadeIn 0.4s ease; }
        .form-section.active { display: block; }
        
        .input-group { margin-bottom: 1.5rem; }
        .input-group label { display: block; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 0.5rem; }
        .input-group input, .input-group textarea {
            width: 100%; padding: 1rem; background: rgba(255,255,255,0.02); border: 1px solid var(--border-subtle);
            border-radius: 12px; color: white; outline: none; font-size: 1rem; transition: 0.3s;
        }
        .input-group input:focus, .input-group textarea:focus { border-color: var(--primary); }
        .input-group textarea { resize: vertical; min-height: 80px; }

        .search-wrapper { position: relative; }
        .search-results {
            position: absolute; top: 100%; left: 0; right: 0; background: #1a1a1a; border: 1px solid var(--border-subtle);
            border-radius: 12px; max-height: 200px; overflow-y: auto; z-index: 50; display: none; margin-top: 5px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .search-item { padding: 1rem; border-bottom: 1px solid var(--border-subtle); cursor: pointer; font-size: 0.9rem; display: flex; align-items: center; gap: 10px; }
        .search-item:hover { background: rgba(255,255,255,0.05); }

        .modal-actions { display: flex; gap: 1rem; margin-top: 2rem; }
        .btn-cancel, .btn-submit { flex: 1; padding: 1.2rem; border-radius: 12px; font-weight: 600; cursor: pointer; transition: 0.3s; }
        .btn-cancel { background: transparent; border: 1px solid var(--border-subtle); color: white; }
        .btn-cancel:hover { background: rgba(255,255,255,0.05); }
        .btn-submit { background: var(--primary); border: none; color: var(--bg-color); }
        .btn-submit:hover { transform: scale(0.98); }

        /* Toasts */
        #toast-container { position: fixed; bottom: 30px; right: 30px; z-index: 2000; display: flex; flex-direction: column; gap: 10px; }
        .toast { background: rgba(20,20,20,0.9); backdrop-filter: blur(10px); border: 1px solid var(--border-subtle); color: white; padding: 1rem 1.5rem; border-radius: 12px; display: flex; align-items: center; gap: 12px; font-size: 0.9rem; box-shadow: 0 10px 30px rgba(0,0,0,0.5); animation: slideInToast 0.4s forwards; }
        @keyframes slideInToast { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes slideOutToast { from { transform: translateX(0); opacity: 1; } to { transform: translateX(100%); opacity: 0; } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="page-loader">
        <i data-lucide="compass" style="width: 48px; height: 48px; color: var(--primary); animation: spin 2s linear infinite;"></i>
        <p style="margin-top: 15px; color: var(--text-muted);">Sincronizando con la base de datos...</p>
    </div>

    <nav>
        <button class="btn-back" onclick="window.location.href='panel.html'">
            <i data-lucide="arrow-left"></i> Volver al Panel
        </button>
        <div class="logo"><i data-lucide="map" style="color: var(--primary);"></i> Interrail.</div>
        <div style="width: 80px;"></div>
    </nav>

    <div class="trip-header">
        <h1 id="trip-title">Cargando...</h1>
        <p id="trip-dates">---</p>
    </div>

    <div class="tabs-container">
        <button class="tab-btn active" onclick="switchTab('itinerario')">Itinerario</button>
        <button class="tab-btn" onclick="switchTab('usuarios')">Equipo y Accesos</button>
    </div>

    <main id="tab-itinerario" class="tab-content active">
        <div id="itinerary-container"></div>
    </main>

    <main id="tab-usuarios" class="tab-content">
        <div class="users-grid">
            <div class="user-section">
                <h3><i data-lucide="users"></i> Miembros del Viaje</h3>
                <div id="members-list">
                    <p style="color: var(--text-muted); font-size: 0.9rem;">Cargando miembros...</p>
                </div>
            </div>
            
            <div class="user-section" id="admin-requests-panel" style="display: none; border-color: var(--accent-blue);">
                <h3 style="color: var(--accent-blue);"><i data-lucide="bell"></i> Solicitudes Pendientes</h3>
                <div id="requests-list">
                    <p style="color: var(--text-muted); font-size: 0.9rem;">No hay solicitudes nuevas.</p>
                </div>
            </div>
        </div>
    </main>

    <div class="modal-overlay" id="omni-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Añadir a la ruta</h2>
                <p style="color: var(--text-muted); font-size: 0.9rem; margin-top: 5px;" id="modal-date-subtitle">Día seleccionado</p>
            </div>

            <div class="type-selector">
                <button class="type-btn active" data-type="transport" onclick="switchModalTab('transport')"><i data-lucide="train"></i> Viaje</button>
                <button class="type-btn" data-type="hotel" onclick="switchModalTab('hotel')"><i data-lucide="bed"></i> Dormir</button>
                <button class="type-btn" data-type="plan" onclick="switchModalTab('plan')"><i data-lucide="map-pin"></i> Plan</button>
            </div>

            <form id="omni-form">
                <div id="form-transport" class="form-section active">
                    <div class="input-group">
                        <label>Hora de salida</label>
                        <input type="text" id="trans-time" class="time-picker" placeholder="Ej. 14:30" readonly>
                    </div>
                    <div class="input-group">
                        <label>Trayecto o Medio</label>
                        <input type="text" id="trans-title" placeholder="Ej. Tren Berlín -> Praga">
                    </div>
                </div>

                <div id="form-hotel" class="form-section">
                    <div class="input-group">
                        <label>Alojamiento / Dirección</label>
                        <div class="search-wrapper">
                            <input type="text" id="hotel-search" placeholder="Buscar en OpenStreetMap..." oninput="searchLocation(this)" autocomplete="off">
                            <div class="search-results" id="hotel-results"></div>
                        </div>
                    </div>
                    <div class="input-group">
                        <label>¿Qué noches duermes aquí? (*Se añadirá a todos los días marcados)</label>
                        <input type="text" id="hotel-nights" class="range-picker" placeholder="Selecciona el rango de noches" readonly>
                    </div>
                </div>

                <div id="form-plan" class="form-section">
                    <div class="input-group">
                        <label>Hora (Opcional)</label>
                        <input type="text" id="plan-time" class="time-picker" placeholder="Ej. 10:00" readonly>
                    </div>
                    <div class="input-group">
                        <label>¿Qué hacemos?</label>
                        <input type="text" id="plan-title" placeholder="Ej. Visita al Muro">
                    </div>
                </div>

                <div class="input-group" style="margin-top: 1.5rem; border-top: 1px solid var(--border-subtle); padding-top: 1.5rem;">
                    <label>Notas extra (Opcional)</label>
                    <textarea id="common-notes" placeholder="Reserva #123, precio, avisos..."></textarea>
                </div>

                <div class="modal-actions">
                    <button type="button" class="btn-cancel" onclick="closeModal()">Cancelar</button>
                    <button type="submit" class="btn-submit" id="btn-submit-form">Guardar en la Nube</button>
                </div>
            </form>
        </div>
    </div>

    <div id="toast-container"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // 1. CONFIGURACIÓN FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyDRkUJnDLzknFz3KOnPEm4UFsgf6R4z1Uk",
            authDomain: "interra26-22ecd.firebaseapp.com",
            projectId: "interra26-22ecd",
            storageBucket: "interra26-22ecd.firebasestorage.app",
            messagingSenderId: "960505222050",
            appId: "1:960505222050:web:a9943c6fec9532141f98fb"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Variables Globales
        const urlParams = new URLSearchParams(window.location.search);
        const tripId = urlParams.get('id');
        let currentTripData = null;
        let currentUserRole = null;
        let canEdit = false; // Lógica estricta de base de datos
        const SUPERADMIN_EMAIL = "tu_correo@gmail.com"; 

        // Flatpickr Instances
        const timePickers = flatpickr(".time-picker", { enableTime: true, noCalendar: true, dateFormat: "H:i", time_24hr: true });
        let nightsPicker = flatpickr("#hotel-nights", { mode: "range", dateFormat: "d/m/Y", locale: "es" });

        // 2. SISTEMA DE TOASTS
        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'toast';
            const icon = type === 'success' ? '<i data-lucide="check-circle" style="color: var(--success); width:20px;"></i>' : '<i data-lucide="info" style="color: var(--accent-blue); width:20px;"></i>';
            toast.innerHTML = `${icon} <span>${message}</span>`;
            container.appendChild(toast);
            lucide.createIcons();
            setTimeout(() => { toast.style.animation = 'slideOutToast 0.4s forwards'; setTimeout(() => toast.remove(), 400); }, 3500);
        }

        // 3. SEGURIDAD Y CARGA DESDE LA NUBE
        onAuthStateChanged(auth, async (user) => {
            if (!user) { window.location.href = 'index.html'; return; }
            if (!tripId) { window.location.href = 'panel.html'; return; }

            try {
                await loadTripFromCloud(user);
            } catch (error) {
                console.error(error);
                alert("Error al conectar con la base de datos.");
            }
        });

        async function loadTripFromCloud(user) {
            const tripRef = doc(db, "viajes", tripId);
            const tripSnap = await getDoc(tripRef);

            if (tripSnap.exists()) {
                currentTripData = tripSnap.data();
                
                // Determinar Roles Reales
                const miembros = currentTripData.miembros || {};
                const isGod = user.email === SUPERADMIN_EMAIL;
                currentUserRole = isGod ? "Nivel Dios" : miembros[user.uid];

                if (!currentUserRole) {
                    alert("No tienes permiso para ver este viaje.");
                    window.location.href = 'panel.html';
                    return;
                }

                // Permisos de edición (Solo Admin y Editor pueden modificar)
                canEdit = isGod || currentUserRole === "admin-grupo" || currentUserRole === "editor-grupo";

                // Si es Dios o Admin, ve las solicitudes
                if (isGod || currentUserRole === "admin-grupo") {
                    document.getElementById('admin-requests-panel').style.display = 'block';
                }

                // Asegurar que existe el array de eventos
                if(!currentTripData.eventos) currentTripData.eventos = [];

                renderHeader();
                renderItinerary();
                renderUsers();

                document.getElementById('page-loader').style.opacity = '0';
                setTimeout(() => document.getElementById('page-loader').style.display = 'none', 500);
            } else {
                alert("El viaje no existe.");
                window.location.href = 'panel.html';
            }
        }

        // 4. RENDERIZADO VISUAL
        function renderHeader() {
            document.getElementById('trip-title').innerText = currentTripData.nombre;
            document.getElementById('trip-dates').innerText = `Del ${currentTripData.fechaInicio} al ${currentTripData.fechaFin}`;
            
            // Actualizar límites del calendario de hoteles
            const parseDate = (str) => { const [d,m,y] = str.split('/'); return new Date(y, m-1, d); };
            nightsPicker.set('minDate', parseDate(currentTripData.fechaInicio));
            nightsPicker.set('maxDate', parseDate(currentTripData.fechaFin));
        }

        function renderItinerary() {
            const container = document.getElementById('itinerary-container');
            container.innerHTML = '';

            const parseDate = (str) => { const [d,m,y] = str.split('/'); return new Date(y, m-1, d); };
            const start = parseDate(currentTripData.fechaInicio);
            const end = parseDate(currentTripData.fechaFin);
            
            // Agrupar eventos de Firebase por fecha
            const groupedEvents = {};
            currentTripData.eventos.forEach(ev => {
                if(!groupedEvents[ev.dateKey]) groupedEvents[ev.dateKey] = [];
                groupedEvents[ev.dateKey].push(ev);
            });

            let current = new Date(start);
            let dayCount = 1;

            while (current <= end) {
                // Formatear fecha para usarla como ID único en el array (YYYY-MM-DD)
                const dateKey = current.toISOString().split('T')[0]; 
                const dateStr = current.toLocaleDateString('es-ES', { weekday: 'long', day: 'numeric', month: 'short' });
                const eventsToday = groupedEvents[dateKey] || [];
                
                eventsToday.sort((a, b) => (a.time || '24:00').localeCompare(b.time || '24:00'));

                let eventsHTML = '';
                if (eventsToday.length === 0) {
                    eventsHTML = `<div class="timeline-empty">Día libre. Explora a tu ritmo.</div>`;
                } else {
                    eventsToday.forEach(ev => {
                        let icon = ev.type === 'transport' ? 'train' : (ev.type === 'hotel' ? 'bed' : 'map-pin');
                        eventsHTML += `
                            <div class="event-card type-${ev.type}">
                                <div class="event-time">${ev.time || '--:--'}</div>
                                <div class="event-icon"><i data-lucide="${icon}"></i></div>
                                <div class="event-content">
                                    <div class="event-title">${ev.title}</div>
                                    ${ev.notes ? `<div class="event-desc">${ev.notes}</div>` : ''}
                                </div>
                                ${canEdit ? `<button class="btn-delete" onclick="deleteEvent('${ev.id}')"><i data-lucide="trash-2" style="width:16px;"></i></button>` : ''}
                            </div>
                        `;
                    });
                }

                container.innerHTML += `
                    <div class="day-container">
                        <div class="day-header">
                            <div class="day-title">Día ${dayCount} <span class="day-date">${dateStr}</span></div>
                            ${canEdit ? `
                            <button class="btn-add-day" onclick="openModal('${dateKey}', '${dateStr}')">
                                <i data-lucide="plus"></i> Añadir
                            </button>` : ''}
                        </div>
                        <div class="timeline-wrapper">${eventsHTML}</div>
                    </div>
                `;
                
                current.setDate(current.getDate() + 1);
                dayCount++;
            }
            lucide.createIcons();
        }

        // 5. RENDERIZADO DE PESTAÑA USUARIOS
        window.switchTab = function(tabName) {
            document.querySelectorAll('.tab-content, .tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(`tab-${tabName}`).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        function renderUsers() {
            const miembrosList = document.getElementById('members-list');
            const reqList = document.getElementById('requests-list');
            miembrosList.innerHTML = '';
            reqList.innerHTML = '';

            // Renderizar Miembros
            for (const [uid, rol] of Object.entries(currentTripData.miembros || {})) {
                miembrosList.innerHTML += `
                    <div class="user-row">
                        <div class="user-info">
                            <i data-lucide="user-circle" style="color: var(--text-muted);"></i>
                            <span>Usuario (${uid.substring(0,6)}...)</span>
                        </div>
                        <span class="user-role-tag">${rol.replace('-', ' ')}</span>
                    </div>
                `;
            }

            // Renderizar Solicitudes (Si existe el objeto y si somos admin)
            if(currentTripData.solicitudes && Object.keys(currentTripData.solicitudes).length > 0) {
                for (const [uid, reqInfo] of Object.entries(currentTripData.solicitudes)) {
                    reqList.innerHTML += `
                        <div class="user-row">
                            <div class="user-info">
                                <i data-lucide="mail"></i> <span>Nueva solicitud de acceso (${uid.substring(0,6)})</span>
                            </div>
                            <div class="request-actions">
                                <button class="btn-accept" onclick="gestionarSolicitud('${uid}', 'accept')" title="Aceptar"><i data-lucide="check" style="width:16px;"></i></button>
                                <button class="btn-deny" onclick="gestionarSolicitud('${uid}', 'deny')" title="Denegar"><i data-lucide="x" style="width:16px;"></i></button>
                            </div>
                        </div>
                    `;
                }
            } else {
                reqList.innerHTML = `<p style="color: var(--text-muted); font-size: 0.9rem;">No hay solicitudes nuevas.</p>`;
            }
            lucide.createIcons();
        }

        // Lógica de aceptar/denegar
        window.gestionarSolicitud = async function(uid, accion) {
            try {
                const tripRef = doc(db, "viajes", tripId);
                const newData = { ...currentTripData };
                
                delete newData.solicitudes[uid]; // Quitar de solicitudes

                if (accion === 'accept') {
                    // Por defecto, al aceptar se le da rol 'editor-grupo'
                    newData.miembros[uid] = "editor-grupo";
                    showToast("Usuario aceptado en el grupo.");
                } else {
                    showToast("Solicitud denegada.", "info");
                }

                await updateDoc(tripRef, newData);
                currentTripData = newData; // Actualizar local
                renderUsers();
            } catch (e) {
                console.error(e);
                alert("Error al actualizar la base de datos.");
            }
        }

        // 6. LÓGICA DEL OMNI-MODAL Y GUARDADO EN LA NUBE
        let selectedDateKey = null;
        let currentModalType = 'transport';

        window.openModal = function(dateKey, dateStr) {
            selectedDateKey = dateKey;
            document.getElementById('modal-date-subtitle').innerText = `Añadiendo al: ${dateStr}`;
            document.getElementById('omni-form').reset();
            nightsPicker.clear();
            document.getElementById('omni-modal').classList.add('active');
        }
        window.closeModal = () => document.getElementById('omni-modal').classList.remove('active');
        
        window.switchModalTab = function(type) {
            currentModalType = type;
            document.querySelectorAll('.type-btn, .form-section').forEach(el => el.classList.remove('active'));
            event.currentTarget.classList.add('active');
            document.getElementById(`form-${type}`).classList.add('active');
        }

        // Buscador Nominatim
        let searchTimeout;
        window.searchLocation = function(input) {
            clearTimeout(searchTimeout);
            const results = document.getElementById('hotel-results');
            if (input.value.length < 3) { results.style.display = 'none'; return; }
            searchTimeout = setTimeout(async () => {
                const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${input.value}&limit=4`);
                const data = await res.json();
                results.innerHTML = '';
                if(data.length > 0) {
                    data.forEach(place => {
                        const name = place.display_name.split(',').slice(0, 3).join(',');
                        results.innerHTML += `<div class="search-item" onclick="selectLocation('${name.replace(/'/g, "\\'")}')"><i data-lucide="map-pin" style="width:14px; color:gray;"></i> ${name}</div>`;
                    });
                    results.style.display = 'block'; lucide.createIcons();
                }
            }, 400);
        }
        window.selectLocation = function(name) { document.getElementById('hotel-search').value = name; document.getElementById('hotel-results').style.display = 'none'; }

        // Enviar a la nube (Magia de Firebase)
        document.getElementById('omni-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-submit-form');
            btn.innerText = 'Guardando...'; btn.style.opacity = '0.5';

            const notes = document.getElementById('common-notes').value;
            const generateId = () => Date.now().toString(36) + Math.random().toString(36).substr(2); // ID único para Firebase
            
            let nuevosEventos = [];

            if (currentModalType === 'transport') {
                nuevosEventos.push({ id: generateId(), dateKey: selectedDateKey, type: 'transport', time: document.getElementById('trans-time').value, title: document.getElementById('trans-title').value || 'Transporte', notes: notes });
            } 
            else if (currentModalType === 'plan') {
                nuevosEventos.push({ id: generateId(), dateKey: selectedDateKey, type: 'plan', time: document.getElementById('plan-time').value, title: document.getElementById('plan-title').value || 'Plan sin título', notes: notes });
            }
            else if (currentModalType === 'hotel') {
                const title = document.getElementById('hotel-search').value || 'Alojamiento';
                const dates = nightsPicker.selectedDates;
                if (dates.length !== 2) { alert("Selecciona el rango de fechas del hotel."); btn.innerText = 'Guardar en la Nube'; btn.style.opacity = '1'; return; }
                
                // Magia de las noches
                let currDate = new Date(dates[0]);
                while (currDate <= dates[1]) {
                    const dKey = currDate.toISOString().split('T')[0];
                    nuevosEventos.push({ id: generateId(), dateKey: dKey, type: 'hotel', time: null, title: title, notes: notes });
                    currDate.setDate(currDate.getDate() + 1);
                }
            }

            try {
                // Actualizar array en Firestore
                const tripRef = doc(db, "viajes", tripId);
                const updatedEventos = [...currentTripData.eventos, ...nuevosEventos];
                
                await updateDoc(tripRef, { eventos: updatedEventos });
                
                // Actualizar local y renderizar
                currentTripData.eventos = updatedEventos;
                closeModal();
                renderItinerary();
                showToast("Guardado en la nube correctamente.");
            } catch (error) {
                console.error(error);
                alert("Error al guardar en Firebase.");
            } finally {
                btn.innerText = 'Guardar en la Nube'; btn.style.opacity = '1';
            }
        });

        // Eliminar evento de la nube
        window.deleteEvent = async function(eventId) {
            try {
                const tripRef = doc(db, "viajes", tripId);
                // Filtramos el array local quitando el que tiene el ID correspondiente
                const updatedEventos = currentTripData.eventos.filter(ev => ev.id !== eventId);
                
                // Actualizamos Firebase
                await updateDoc(tripRef, { eventos: updatedEventos });
                
                // Actualizamos vista
                currentTripData.eventos = updatedEventos;
                renderItinerary();
                showToast("Plan eliminado.", "info");
            } catch (e) {
                console.error(e);
                alert("Error al borrar el plan.");
            }
        }

        lucide.createIcons();
    </script>
    <style>@keyframes spin { 100% { transform: rotate(360deg); } }</style>
</body>
</html>
