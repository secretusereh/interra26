<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interrail | Detalles del Viaje</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root {
            --bg-color: #050505;
            --surface: rgba(20, 20, 20, 0.6);
            --surface-hover: rgba(30, 30, 30, 0.8);
            --primary: #ffffff;
            --text-muted: #888888;
            --accent: #ff4d4d;
            --success: #4dff4d;
            --border-subtle: rgba(255, 255, 255, 0.08);
            --transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Sora', sans-serif; }

        body {
            background-color: var(--bg-color); color: var(--primary); min-height: 100vh;
            background-image: radial-gradient(circle at 50% 0%, rgba(255, 255, 255, 0.03), transparent 40%);
        }

        /* Nav (Mismo estilo que panel) */
        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 1.2rem 5%; background: rgba(5, 5, 5, 0.7); backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-subtle); position: sticky; top: 0; z-index: 100;
        }
        .logo { font-weight: 800; font-size: 1.5rem; display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .btn-back { background: transparent; color: var(--text-muted); border: none; cursor: pointer; display: flex; align-items: center; gap: 5px; transition: var(--transition); }
        .btn-back:hover { color: var(--primary); }

        /* Cabecera del Viaje */
        .trip-header { padding: 3rem 5% 1rem; max-width: 1200px; margin: 0 auto; text-align: center; }
        .trip-header h1 { font-size: 3rem; font-weight: 800; letter-spacing: -1px; margin-bottom: 0.5rem; }
        .trip-header p { color: var(--text-muted); font-size: 1.1rem; }

        /* Sistema de Pestañas (Tabs) */
        .tabs-container {
            display: flex; justify-content: center; gap: 2rem; border-bottom: 1px solid var(--border-subtle);
            max-width: 1200px; margin: 2rem auto 0; padding: 0 5%;
        }
        .tab-btn {
            background: transparent; color: var(--text-muted); border: none; font-size: 1.1rem; font-weight: 600;
            padding: 1rem 0; cursor: pointer; position: relative; transition: var(--transition);
        }
        .tab-btn.active { color: var(--primary); }
        .tab-btn.active::after {
            content: ''; position: absolute; bottom: -1px; left: 0; width: 100%; height: 2px;
            background: var(--primary); border-radius: 2px 2px 0 0;
        }

        /* Contenedores de contenido */
        .tab-content { display: none; padding: 3rem 5%; max-width: 1200px; margin: 0 auto; animation: fadeIn 0.5s ease; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* =========================================
           PESTAÑA 1: ITINERARIO (DÍAS)
           ========================================= */
        .days-grid { display: flex; flex-direction: column; gap: 2rem; }
        
        .day-card {
            background: var(--surface); border: 1px solid var(--border-subtle); border-radius: 16px;
            padding: 2rem; backdrop-filter: blur(10px); display: flex; flex-direction: column; gap: 1.5rem;
        }
        .day-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-subtle); padding-bottom: 1rem; }
        .day-header h3 { font-size: 1.5rem; display: flex; align-items: center; gap: 10px; }
        .day-date { color: var(--text-muted); font-weight: 300; }

        /* Buscador de Alojamiento (Nominatim API) */
        .accommodation-box { background: rgba(0,0,0,0.3); padding: 1rem; border-radius: 12px; border: 1px dashed var(--border-subtle); }
        .search-wrapper { position: relative; display: flex; gap: 10px; margin-top: 10px; }
        .search-wrapper input {
            flex: 1; padding: 0.8rem; background: rgba(255,255,255,0.05); border: 1px solid var(--border-subtle);
            color: white; border-radius: 8px; outline: none;
        }
        .search-results {
            position: absolute; top: 100%; left: 0; right: 0; background: #1a1a1a; border: 1px solid var(--border-subtle);
            border-radius: 8px; max-height: 200px; overflow-y: auto; z-index: 50; display: none; margin-top: 5px;
        }
        .search-result-item { padding: 0.8rem; border-bottom: 1px solid var(--border-subtle); cursor: pointer; font-size: 0.85rem; }
        .search-result-item:hover { background: rgba(255,255,255,0.05); }

        /* Planificación por horas */
        .timeline { display: flex; flex-direction: column; gap: 1rem; }
        .timeline-item {
            display: flex; gap: 1rem; background: rgba(255,255,255,0.02); padding: 1rem; border-radius: 8px;
            border-left: 3px solid var(--text-muted);
        }
        .time-badge { font-weight: 800; color: var(--primary); min-width: 60px; }
        .plan-details { flex: 1; }
        .plan-title { font-weight: 600; margin-bottom: 0.3rem; }
        .plan-notes { font-size: 0.85rem; color: var(--text-muted); }

        .btn-add-plan {
            align-self: flex-start; background: transparent; color: var(--primary); border: 1px solid var(--border-subtle);
            padding: 0.6rem 1.2rem; border-radius: 30px; font-size: 0.85rem; cursor: pointer; display: flex; align-items: center; gap: 5px;
            transition: var(--transition);
        }
        .btn-add-plan:hover { background: var(--primary); color: var(--bg-color); }

        /* =========================================
           PESTAÑA 2: USUARIOS
           ========================================= */
        .users-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; }
        .user-section { background: var(--surface); padding: 2rem; border-radius: 16px; border: 1px solid var(--border-subtle); }
        .user-section h3 { margin-bottom: 1.5rem; border-bottom: 1px solid var(--border-subtle); padding-bottom: 0.5rem; }
        
        .user-row { display: flex; justify-content: space-between; align-items: center; padding: 1rem 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .user-info { display: flex; align-items: center; gap: 10px; }
        .user-role-tag { font-size: 0.7rem; padding: 0.2rem 0.5rem; border-radius: 10px; background: rgba(255,255,255,0.1); }
        
        .request-actions { display: flex; gap: 10px; }
        .btn-accept { background: rgba(77, 255, 77, 0.2); color: var(--success); border: none; padding: 0.5rem 1rem; border-radius: 6px; cursor: pointer; }
        .btn-deny { background: rgba(255, 77, 77, 0.2); color: var(--accent); border: none; padding: 0.5rem 1rem; border-radius: 6px; cursor: pointer; }
    </style>
</head>
<body>

    <nav>
        <button class="btn-back" onclick="window.location.href='panel.html'">
            <i data-lucide="arrow-left"></i> Volver al panel
        </button>
        <div class="logo"><i data-lucide="map"></i> Interrail.</div>
        <div style="width: 100px;"></div> </nav>

    <div class="trip-header">
        <h1 id="trip-title">Cargando viaje...</h1>
        <p id="trip-dates"><i data-lucide="calendar" style="width:16px; vertical-align:middle;"></i> ---</p>
    </div>

    <div class="tabs-container">
        <button class="tab-btn active" onclick="switchTab('itinerario')">Itinerario</button>
        <button class="tab-btn" onclick="switchTab('usuarios')">Equipo y Accesos</button>
    </div>

    <div id="tab-itinerario" class="tab-content active">
        <div class="days-grid" id="days-container">
            <div style="text-align: center; color: var(--text-muted);">Generando calendario...</div>
        </div>
    </div>

    <div id="tab-usuarios" class="tab-content">
        <div class="users-grid">
            <div class="user-section">
                <h3>Miembros del Grupo</h3>
                <div id="members-list">
                    </div>
            </div>
            <div class="user-section" id="admin-requests-panel" style="display: none;">
                <h3>Solicitudes Pendientes</h3>
                <div id="requests-list">
                    <p style="color: var(--text-muted); font-size: 0.9rem;">No hay solicitudes nuevas.</p>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDRkUJnDLzknFz3KOnPEm4UFsgf6R4z1Uk",
            authDomain: "interra26-22ecd.firebaseapp.com",
            projectId: "interra26-22ecd",
            storageBucket: "interra26-22ecd.firebasestorage.app",
            messagingSenderId: "960505222050",
            appId: "1:960505222050:web:a9943c6fec9532141f98fb"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // 1. OBTENER ID DEL VIAJE DE LA URL
        const urlParams = new URLSearchParams(window.location.search);
        const tripId = urlParams.get('id');

        let currentTripData = null;
        let userRole = null;

        // 2. SISTEMA DE PESTAÑAS (TABS)
        window.switchTab = function(tabName) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            
            document.getElementById(`tab-${tabName}`).classList.add('active');
            event.currentTarget.classList.add('active');
        };

        // 3. SEGURIDAD Y CARGA DE DATOS
        onAuthStateChanged(auth, async (user) => {
            if (!user) { window.location.href = 'index.html'; return; }
            if (!tripId) { window.location.href = 'panel.html'; return; }

            try {
                const tripRef = doc(db, "viajes", tripId);
                const tripSnap = await getDoc(tripRef);

                if (tripSnap.exists()) {
                    currentTripData = tripSnap.data();
                    userRole = currentTripData.miembros[user.uid] || (user.email === "tu_correo@gmail.com" ? "admin-grupo" : null);

                    if (!userRole) {
                        alert("No tienes permiso para ver este viaje.");
                        window.location.href = 'panel.html';
                        return;
                    }

                    renderHeader();
                    renderDays();
                    renderUsers();

                    // Si es admin, mostramos el panel de solicitudes
                    if(userRole === "admin-grupo") {
                        document.getElementById('admin-requests-panel').style.display = 'block';
                    }

                } else {
                    alert("El viaje no existe.");
                    window.location.href = 'panel.html';
                }
            } catch (error) {
                console.error("Error cargando viaje:", error);
            }
        });

        // 4. RENDERIZAR CABECERA
        function renderHeader() {
            document.getElementById('trip-title').innerText = currentTripData.nombre;
            document.getElementById('trip-dates').innerHTML = `<i data-lucide="calendar" style="width:16px; vertical-align:middle;"></i> ${currentTripData.fechaInicio} al ${currentTripData.fechaFin}`;
            lucide.createIcons();
        }

        // 5. GENERADOR DINÁMICO DE DÍAS
        function renderDays() {
            const container = document.getElementById('days-container');
            container.innerHTML = '';

            // Convertir DD/MM/YYYY a Objeto Date de JS
            const parseDate = (str) => {
                const [d, m, y] = str.split('/');
                return new Date(y, m - 1, d);
            };

            const start = parseDate(currentTripData.fechaInicio);
            const end = parseDate(currentTripData.fechaFin);
            
            // Bucle desde inicio hasta fin
            let diaActual = new Date(start);
            let numDia = 1;

            while (diaActual <= end) {
                const dateString = diaActual.toLocaleDateString('es-ES', { weekday: 'long', day: 'numeric', month: 'long' });
                
                const card = document.createElement('div');
                card.className = 'day-card';
                card.innerHTML = `
                    <div class="day-header">
                        <h3>Día ${numDia}</h3>
                        <span class="day-date">${dateString.charAt(0).toUpperCase() + dateString.slice(1)}</span>
                    </div>

                    <div class="accommodation-box">
                        <label style="font-size: 0.85rem; color: var(--text-muted);"><i data-lucide="bed" style="width:14px;"></i> Alojamiento</label>
                        <div class="search-wrapper">
                            <input type="text" placeholder="Buscar hotel, hostal o dirección..." oninput="buscarLocalizacion(this)">
                            <div class="search-results"></div>
                        </div>
                    </div>

                    <div class="timeline">
                        <div class="timeline-item">
                            <div class="time-badge">12:00</div>
                            <div class="plan-details">
                                <div class="plan-title">Llegada a destino</div>
                                <div class="plan-notes">Ir a dejar las mochilas al hostal.</div>
                            </div>
                        </div>
                    </div>

                    ${userRole === 'admin-grupo' || userRole === 'editor-grupo' ? 
                    `<button class="btn-add-plan"><i data-lucide="plus" style="width:14px;"></i> Añadir plan o transporte</button>` : ''}
                `;
                container.appendChild(card);
                
                diaActual.setDate(diaActual.getDate() + 1);
                numDia++;
            }
            lucide.createIcons();
        }

        // 6. BUSCADOR DE LOCALIZACIONES (API OpenStreetMap / Nominatim)
        let searchTimeout;
        window.buscarLocalizacion = function(inputElement) {
            clearTimeout(searchTimeout);
            const query = inputElement.value;
            const resultsBox = inputElement.nextElementSibling;

            if (query.length < 3) { resultsBox.style.display = 'none'; return; }

            // Retrasar la búsqueda 500ms para no saturar la API al escribir rápido
            searchTimeout = setTimeout(async () => {
                try {
                    const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${query}&limit=4`);
                    const data = await response.json();
                    
                    resultsBox.innerHTML = '';
                    if(data.length > 0) {
                        data.forEach(place => {
                            const item = document.createElement('div');
                            item.className = 'search-result-item';
                            item.innerText = place.display_name.split(',').slice(0, 3).join(','); // Acortar nombre
                            item.onclick = () => {
                                inputElement.value = item.innerText;
                                resultsBox.style.display = 'none';
                                // TODO: Guardar ubicación en base de datos
                            };
                            resultsBox.appendChild(item);
                        });
                        resultsBox.style.display = 'block';
                    } else {
                        resultsBox.style.display = 'none';
                    }
                } catch(e) { console.error(e); }
            }, 500);
        }

        // 7. RENDERIZAR USUARIOS MOCKUP
        function renderUsers() {
            const list = document.getElementById('members-list');
            list.innerHTML = '';
            
            // Iterar sobre los miembros (Actualmente solo tenemos IDs, en V2 cruzaremos con colección Usuarios para sacar el nombre)
            for (const [uid, rol] of Object.entries(currentTripData.miembros)) {
                list.innerHTML += `
                    <div class="user-row">
                        <div class="user-info">
                            <i data-lucide="user-circle" style="color: var(--text-muted);"></i>
                            <span>Usuario (${uid.substring(0,5)}...)</span>
                        </div>
                        <span class="user-role-tag">${rol.replace('-', ' ')}</span>
                    </div>
                `;
            }
            lucide.createIcons();
        }
    </script>
</body>
</html>
