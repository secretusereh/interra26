<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interrail | Planificador</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/themes/dark.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://npmcdn.com/flatpickr/dist/l10n/es.js"></script>

    <style>
        /* =========================================
           VARIABLES Y DISEÑO BASE
           ========================================= */
        :root {
            --bg-color: #030303;
            --surface: rgba(20, 20, 20, 0.4);
            --surface-solid: #141414;
            --primary: #ffffff;
            --text-muted: #888888;
            --accent: #ff4d4d;
            --accent-blue: #4da6ff;
            --accent-green: #4dff88;
            --border-subtle: rgba(255, 255, 255, 0.08);
            --transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Sora', sans-serif; }

        body {
            background-color: var(--bg-color); color: var(--primary); min-height: 100vh;
            background-image: radial-gradient(circle at 50% -10%, rgba(255, 255, 255, 0.05), transparent 60%);
        }

        /* Nav */
        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 1rem 5%; background: rgba(3, 3, 3, 0.8); backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-subtle); position: sticky; top: 0; z-index: 100;
        }
        .btn-back { background: transparent; color: var(--text-muted); border: none; cursor: pointer; display: flex; align-items: center; gap: 8px; font-weight: 600; transition: var(--transition); }
        .btn-back:hover { color: var(--primary); }
        .logo { font-weight: 800; font-size: 1.2rem; display: flex; align-items: center; gap: 10px; }

        /* Cabecera */
        .trip-header { padding: 3rem 5% 2rem; max-width: 1000px; margin: 0 auto; text-align: center; }
        .trip-header h1 { font-size: 3.5rem; font-weight: 800; letter-spacing: -2px; margin-bottom: 0.5rem; }
        .trip-header p { color: var(--text-muted); font-size: 1.1rem; }

        /* =========================================
           GRID DE DÍAS Y TIMELINE REAL
           ========================================= */
        main { max-width: 900px; margin: 0 auto; padding: 0 5% 5rem; }
        
        .day-container {
            margin-bottom: 3rem; position: relative;
            animation: fadeIn 0.6s ease forwards;
        }

        .day-header {
            display: flex; justify-content: space-between; align-items: center;
            padding-bottom: 1rem; border-bottom: 1px solid var(--border-subtle); margin-bottom: 1.5rem;
            position: sticky; top: 70px; background: var(--bg-color); z-index: 10;
        }
        .day-title { font-size: 1.8rem; font-weight: 600; display: flex; align-items: baseline; gap: 10px; }
        .day-date { font-size: 1rem; color: var(--text-muted); font-weight: 300; }
        
        .btn-add-day {
            background: rgba(255,255,255,0.05); color: var(--primary); border: 1px solid var(--border-subtle);
            padding: 0.6rem 1.2rem; border-radius: 30px; font-size: 0.85rem; font-weight: 600;
            cursor: pointer; display: flex; align-items: center; gap: 6px; transition: var(--transition);
        }
        .btn-add-day:hover { background: var(--primary); color: var(--bg-color); transform: scale(0.95); }

        /* Timeline Items */
        .timeline-wrapper { position: relative; padding-left: 20px; }
        .timeline-wrapper::before {
            content: ''; position: absolute; left: 0; top: 10px; bottom: 0; width: 2px;
            background: linear-gradient(to bottom, var(--border-subtle), transparent);
        }

        .timeline-empty {
            color: var(--text-muted); font-size: 0.9rem; font-style: italic;
            padding: 2rem; border: 1px dashed var(--border-subtle); border-radius: 12px;
            text-align: center; margin-left: 10px;
        }

        .event-card {
            background: var(--surface); border: 1px solid var(--border-subtle); border-radius: 16px;
            padding: 1.5rem; margin-bottom: 1rem; margin-left: 15px; position: relative;
            backdrop-filter: blur(10px); display: flex; gap: 1.5rem; transition: var(--transition);
        }
        .event-card:hover { border-color: rgba(255,255,255,0.2); transform: translateX(5px); }
        
        /* Puntito en la línea */
        .event-card::before {
            content: ''; position: absolute; left: -21px; top: 25px; width: 10px; height: 10px;
            background: var(--primary); border-radius: 50%; box-shadow: 0 0 10px var(--primary);
        }

        /* Estilos por tipo */
        .event-card.type-transport::before { background: var(--accent-blue); box-shadow: 0 0 10px var(--accent-blue); }
        .event-card.type-hotel::before { background: var(--accent-green); box-shadow: 0 0 10px var(--accent-green); }
        .event-card.type-plan::before { background: var(--accent); box-shadow: 0 0 10px var(--accent); }

        .event-time { font-weight: 800; font-size: 1.2rem; min-width: 60px; }
        .event-icon { 
            width: 40px; height: 40px; border-radius: 10px; display: flex; justify-content: center; align-items: center;
            background: rgba(255,255,255,0.05);
        }
        .event-content { flex: 1; }
        .event-title { font-size: 1.2rem; font-weight: 600; margin-bottom: 0.3rem; }
        .event-desc { color: var(--text-muted); font-size: 0.9rem; line-height: 1.5; }

        /* Botón Eliminar (Magia Hover) */
        .btn-delete {
            position: absolute; top: 1.5rem; right: 1.5rem; background: rgba(255,77,77,0.1); color: var(--accent);
            border: none; width: 32px; height: 32px; border-radius: 8px; cursor: pointer;
            display: flex; justify-content: center; align-items: center; opacity: 0; transition: var(--transition);
        }
        .event-card:hover .btn-delete { opacity: 1; }
        .btn-delete:hover { background: var(--accent); color: white; }

        /* =========================================
           OMNI-MODAL (AÑADIR ELEMENTOS)
           ========================================= */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px);
            z-index: 1000; display: flex; justify-content: center; align-items: center;
            opacity: 0; pointer-events: none; transition: var(--transition);
        }
        .modal-overlay.active { opacity: 1; pointer-events: all; }
        
        .modal-content {
            background: var(--surface-solid); border: 1px solid var(--border-subtle); border-radius: 24px;
            width: 100%; max-width: 550px; padding: 2.5rem; transform: translateY(30px); transition: var(--transition);
            max-height: 90vh; overflow-y: auto;
        }
        .modal-overlay.active .modal-content { transform: translateY(0); }

        .modal-header { text-align: center; margin-bottom: 2rem; }
        .modal-header h2 { font-size: 1.8rem; font-weight: 600; }

        /* Selector de Tipo (Pestañas internas) */
        .type-selector { display: flex; background: rgba(255,255,255,0.03); border-radius: 12px; padding: 5px; margin-bottom: 2rem; }
        .type-btn {
            flex: 1; background: transparent; border: none; color: var(--text-muted); padding: 1rem;
            border-radius: 8px; font-weight: 600; cursor: pointer; transition: var(--transition); display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .type-btn.active { background: var(--primary); color: var(--bg-color); }

        /* Formularios */
        .form-section { display: none; animation: fadeIn 0.4s ease; }
        .form-section.active { display: block; }
        
        .input-group { margin-bottom: 1.5rem; }
        .input-group label { display: block; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 0.5rem; }
        .input-group input, .input-group textarea {
            width: 100%; padding: 1rem; background: rgba(255,255,255,0.02); border: 1px solid var(--border-subtle);
            border-radius: 12px; color: white; outline: none; font-size: 1rem; transition: 0.3s;
        }
        .input-group input:focus, .input-group textarea:focus { border-color: var(--primary); }
        .input-group textarea { resize: vertical; min-height: 80px; }

        /* Buscador Nominatim en Modal */
        .search-wrapper { position: relative; }
        .search-results {
            position: absolute; top: 100%; left: 0; right: 0; background: #1a1a1a; border: 1px solid var(--border-subtle);
            border-radius: 12px; max-height: 200px; overflow-y: auto; z-index: 50; display: none; margin-top: 5px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .search-item { padding: 1rem; border-bottom: 1px solid var(--border-subtle); cursor: pointer; font-size: 0.9rem; display: flex; align-items: center; gap: 10px; }
        .search-item:hover { background: rgba(255,255,255,0.05); }

        .modal-actions { display: flex; gap: 1rem; margin-top: 2rem; }
        .btn-cancel, .btn-submit { flex: 1; padding: 1.2rem; border-radius: 12px; font-weight: 600; cursor: pointer; transition: 0.3s; }
        .btn-cancel { background: transparent; border: 1px solid var(--border-subtle); color: white; }
        .btn-cancel:hover { background: rgba(255,255,255,0.05); }
        .btn-submit { background: var(--primary); border: none; color: var(--bg-color); }
        .btn-submit:hover { transform: scale(0.98); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <nav>
        <button class="btn-back" onclick="window.location.href='panel.html'">
            <i data-lucide="arrow-left"></i> Volver
        </button>
        <div class="logo"><i data-lucide="map" style="color: var(--primary);"></i> Interrail.</div>
        <div style="width: 80px;"></div>
    </nav>

    <div class="trip-header">
        <h1 id="trip-title">Europa 2026</h1>
        <p id="trip-dates">Cargando itinerario...</p>
    </div>

    <main id="itinerary-container">
        </main>

    <div class="modal-overlay" id="omni-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Añadir a la ruta</h2>
                <p style="color: var(--text-muted); font-size: 0.9rem; margin-top: 5px;" id="modal-date-subtitle">Día seleccionado</p>
            </div>

            <div class="type-selector">
                <button class="type-btn active" data-type="transport" onclick="switchModalTab('transport')"><i data-lucide="train"></i> Viaje</button>
                <button class="type-btn" data-type="hotel" onclick="switchModalTab('hotel')"><i data-lucide="bed"></i> Dormir</button>
                <button class="type-btn" data-type="plan" onclick="switchModalTab('plan')"><i data-lucide="map-pin"></i> Plan</button>
            </div>

            <form id="omni-form">
                <div id="form-transport" class="form-section active">
                    <div class="input-group">
                        <label>Hora de salida</label>
                        <input type="text" id="trans-time" class="time-picker" placeholder="Ej. 14:30" readonly>
                    </div>
                    <div class="input-group">
                        <label>Trayecto o Medio</label>
                        <input type="text" id="trans-title" placeholder="Ej. Tren Berlín -> Praga">
                    </div>
                </div>

                <div id="form-hotel" class="form-section">
                    <div class="input-group">
                        <label>Alojamiento / Dirección</label>
                        <div class="search-wrapper">
                            <input type="text" id="hotel-search" placeholder="Buscar hotel en OpenStreetMap..." oninput="searchLocation(this)" autocomplete="off">
                            <div class="search-results" id="hotel-results"></div>
                        </div>
                    </div>
                    <div class="input-group">
                        <label>¿Qué noches duermes aquí? (*Se añadirá a todos los días)</label>
                        <input type="text" id="hotel-nights" class="range-picker" placeholder="Selecciona la primera y última noche" readonly>
                    </div>
                </div>

                <div id="form-plan" class="form-section">
                    <div class="input-group">
                        <label>Hora (Opcional)</label>
                        <input type="text" id="plan-time" class="time-picker" placeholder="Ej. 10:00" readonly>
                    </div>
                    <div class="input-group">
                        <label>¿Qué hacemos?</label>
                        <input type="text" id="plan-title" placeholder="Ej. Visita al Muro de Berlín">
                    </div>
                </div>

                <div class="input-group" style="margin-top: 1.5rem; border-top: 1px solid var(--border-subtle); padding-top: 1.5rem;">
                    <label>Notas extra (Opcional)</label>
                    <textarea id="common-notes" placeholder="Número de reserva, precio, recordatorios..."></textarea>
                </div>

                <div class="modal-actions">
                    <button type="button" class="btn-cancel" onclick="closeModal()">Cancelar</button>
                    <button type="submit" class="btn-submit">Añadir al Itinerario</button>
                </div>
            </form>
        </div>
    </div>

    <script type="module">
        // LÓGICA DE SIMULACIÓN Y RENDERIZADO AVANZADO
        // Para esta prueba, simulamos un viaje. En tu app final, esto viene de Firestore.
        
        const TRIP_START = new Date(2026, 5, 26); // 26 Junio
        const TRIP_END = new Date(2026, 6, 2);    // 2 Julio
        
        // El "Cerebro" del itinerario. Objeto donde las claves son las fechas.
        let itineraryData = {};

        // 1. INICIALIZAR LIBRERÍAS DE CALENDARIOS (FLATPICKR)
        flatpickr(".time-picker", { enableTime: true, noCalendar: true, dateFormat: "H:i", time_24hr: true });
        
        const nightsPicker = flatpickr("#hotel-nights", { 
            mode: "range", dateFormat: "d/m/Y", locale: "es",
            minDate: TRIP_START, maxDate: TRIP_END // Limitado a las fechas del viaje
        });

        // 2. GENERAR LA ESTRUCTURA DE DÍAS VACÍOS
        function initTrip() {
            document.getElementById('trip-dates').innerText = `Del 26/06/2026 al 02/07/2026`;
            let current = new Date(TRIP_START);
            
            while (current <= TRIP_END) {
                const dateKey = current.toISOString().split('T')[0];
                if (!itineraryData[dateKey]) itineraryData[dateKey] = []; // Inicializar vacío
                current.setDate(current.getDate() + 1);
            }
            renderItinerary();
        }

        // 3. RENDERIZAR LA INTERFAZ
        function renderItinerary() {
            const container = document.getElementById('itinerary-container');
            container.innerHTML = '';
            let dayCount = 1;

            for (const [dateKey, events] of Object.entries(itineraryData)) {
                // Ordenar eventos por hora (si la tienen)
                events.sort((a, b) => (a.time || '24:00').localeCompare(b.time || '24:00'));

                const dateObj = new Date(dateKey);
                const dateStr = dateObj.toLocaleDateString('es-ES', { weekday: 'long', day: 'numeric', month: 'short' });

                let eventsHTML = '';
                if (events.length === 0) {
                    eventsHTML = `<div class="timeline-empty">Día libre. Añade transporte, hotel o planes.</div>`;
                } else {
                    events.forEach((ev, index) => {
                        let icon = ev.type === 'transport' ? 'train' : (ev.type === 'hotel' ? 'bed' : 'map-pin');
                        eventsHTML += `
                            <div class="event-card type-${ev.type}">
                                <div class="event-time">${ev.time || '--:--'}</div>
                                <div class="event-icon"><i data-lucide="${icon}"></i></div>
                                <div class="event-content">
                                    <div class="event-title">${ev.title}</div>
                                    ${ev.notes ? `<div class="event-desc">${ev.notes}</div>` : ''}
                                </div>
                                <button class="btn-delete" onclick="deleteEvent('${dateKey}', ${index})"><i data-lucide="trash-2" style="width:16px;"></i></button>
                            </div>
                        `;
                    });
                }

                container.innerHTML += `
                    <div class="day-container">
                        <div class="day-header">
                            <div class="day-title">Día ${dayCount} <span class="day-date">${dateStr}</span></div>
                            <button class="btn-add-day" onclick="openModal('${dateKey}', '${dateStr}')">
                                <i data-lucide="plus"></i> Añadir
                            </button>
                        </div>
                        <div class="timeline-wrapper">
                            ${eventsHTML}
                        </div>
                    </div>
                `;
                dayCount++;
            }
            lucide.createIcons();
        }

        // 4. LÓGICA DEL MODAL
        let selectedDateKeyForModal = null;
        let currentModalType = 'transport';

        window.openModal = function(dateKey, dateStr) {
            selectedDateKeyForModal = dateKey;
            document.getElementById('modal-date-subtitle').innerText = `Añadiendo a: ${dateStr}`;
            document.getElementById('omni-form').reset();
            nightsPicker.clear();
            document.getElementById('omni-modal').classList.add('active');
        }

        window.closeModal = function() {
            document.getElementById('omni-modal').classList.remove('active');
        }

        window.switchModalTab = function(type) {
            currentModalType = type;
            document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.form-section').forEach(f => f.classList.remove('active'));
            
            event.currentTarget.classList.add('active');
            document.getElementById(`form-${type}`).classList.add('active');
        }

        // 5. BUSCADOR NOMINATIM MEJORADO
        let searchTimeout;
        window.searchLocation = function(inputElement) {
            clearTimeout(searchTimeout);
            const query = inputElement.value;
            const resultsBox = document.getElementById('hotel-results');

            if (query.length < 3) { resultsBox.style.display = 'none'; return; }

            searchTimeout = setTimeout(async () => {
                try {
                    const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${query}&limit=4`);
                    const data = await response.json();
                    
                    resultsBox.innerHTML = '';
                    if(data.length > 0) {
                        data.forEach(place => {
                            const name = place.display_name.split(',').slice(0, 3).join(',');
                            resultsBox.innerHTML += `
                                <div class="search-item" onclick="selectLocation('${name.replace(/'/g, "\\'")}')">
                                    <i data-lucide="map-pin" style="width:14px; color: var(--text-muted);"></i> ${name}
                                </div>
                            `;
                        });
                        resultsBox.style.display = 'block';
                        lucide.createIcons();
                    }
                } catch(e) { console.error(e); }
            }, 400);
        }

        window.selectLocation = function(name) {
            document.getElementById('hotel-search').value = name;
            document.getElementById('hotel-results').style.display = 'none';
        }

        // 6. AÑADIR ELEMENTOS AL ITINERARIO
        document.getElementById('omni-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const notes = document.getElementById('common-notes').value;

            if (currentModalType === 'transport') {
                itineraryData[selectedDateKeyForModal].push({
                    type: 'transport',
                    time: document.getElementById('trans-time').value,
                    title: document.getElementById('trans-title').value || 'Transporte',
                    notes: notes
                });
            } 
            else if (currentModalType === 'plan') {
                itineraryData[selectedDateKeyForModal].push({
                    type: 'plan',
                    time: document.getElementById('plan-time').value,
                    title: document.getElementById('plan-title').value || 'Plan sin título',
                    notes: notes
                });
            }
            else if (currentModalType === 'hotel') {
                const title = document.getElementById('hotel-search').value || 'Alojamiento reservado';
                const dates = nightsPicker.selectedDates;
                
                if (dates.length === 2) {
                    // Magia: Iterar desde noche 1 a noche 2 y meter el hotel en todos esos días
                    let currDate = new Date(dates[0]);
                    while (currDate <= dates[1]) {
                        const dKey = currDate.toISOString().split('T')[0];
                        if (itineraryData[dKey]) {
                            itineraryData[dKey].push({ type: 'hotel', time: null, title: title, notes: notes });
                        }
                        currDate.setDate(currDate.getDate() + 1);
                    }
                } else {
                    alert("Por favor, selecciona las fechas del alojamiento.");
                    return;
                }
            }

            closeModal();
            renderItinerary();
            // TODO: Aquí iría la función para guardar el 'itineraryData' en Firebase
        });

        // 7. ELIMINAR EVENTOS
        window.deleteEvent = function(dateKey, index) {
            // Animación de salida (opcional para el futuro, ahora es instantáneo)
            itineraryData[dateKey].splice(index, 1);
            renderItinerary();
        }

        // Arrancar la app
        initTrip();
        lucide.createIcons();

    </script>
</body>
</html>
