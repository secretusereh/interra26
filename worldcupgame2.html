<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Blur Challenge | World Cup 26</title>
    
    <link rel="icon" type="image/png" href="interrahublogo.PNG">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;800&family=Teko:wght@500;700&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        /* =========================================
           ESTÉTICA BROADCAST & GLASSMORPHISM
           ========================================= */
        :root {
            --wc-navy: #060913;
            --wc-blue: #004B87;
            --wc-red: #E3003F;
            --wc-gold: #FFC20E;
            --wc-green: #00A651;
            --surface: rgba(15, 20, 35, 0.75);
            --primary: #ffffff;
            --text-muted: #8b9bb4;
            --border-glow: rgba(255, 255, 255, 0.08);
            --transition: 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Sora', sans-serif; }

        body {
            background-color: var(--wc-navy);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(0, 75, 135, 0.2), transparent 50%),
                radial-gradient(circle at 90% 80%, rgba(227, 0, 63, 0.15), transparent 50%);
            color: var(--primary);
            min-height: 100vh;
            overflow-x: hidden;
            background-attachment: fixed;
        }

        /* Nav */
        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 1.2rem 5%; background: rgba(6, 9, 19, 0.9); backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-glow); position: sticky; top: 0; z-index: 100;
        }
        .btn-nav { background: transparent; color: var(--text-muted); border: none; cursor: pointer; display: flex; align-items: center; gap: 8px; font-weight: 600; transition: var(--transition); font-size: 0.9rem;}
        .btn-nav:hover { color: var(--primary); transform: translateX(-4px); }
        .logo-wc { display: flex; align-items: center; gap: 8px; font-family: 'Teko', sans-serif; font-size: 2.2rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--primary); line-height: 1;}
        .logo-wc span { color: var(--wc-red); }

        #page-loader {
            position: fixed; inset: 0; background: var(--wc-navy); z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center; transition: opacity 0.6s ease;
        }
        .loader-ring { width: 50px; height: 50px; border: 3px solid rgba(255,255,255,0.1); border-top-color: var(--wc-gold); border-radius: 50%; animation: spin 1s linear infinite; }

        .game-container {
            max-width: 1400px; margin: 3rem auto; padding: 0 5%;
            display: grid; grid-template-columns: 1fr 450px; gap: 3rem;
        }
        @media (max-width: 1024px) { .game-container { grid-template-columns: 1fr; margin: 2rem auto; gap: 2rem;} }

        /* PANEL IZQUIERDO: EL JUEGO */
        .play-panel {
            background: var(--surface); border: 1px solid var(--border-glow);
            border-radius: 24px; padding: 3rem; backdrop-filter: blur(24px);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);
            display: flex; flex-direction: column; align-items: center; position: relative;
        }

        .hud-top {
            width: 100%; display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;
            border-bottom: 1px solid var(--border-glow); padding-bottom: 1.5rem;
        }
        .round-info { font-family: 'Teko', sans-serif; font-size: 2.5rem; color: var(--primary); line-height: 1; text-transform: uppercase;}
        .round-info span { color: var(--wc-gold); }
        .score-info { background: rgba(0,0,0,0.5); padding: 0.5rem 1.5rem; border-radius: 12px; border: 1px solid var(--border-glow); text-align: center;}
        .score-info span { display: block; font-size: 0.7rem; color: var(--text-muted); font-weight: 800; letter-spacing: 1px;}
        .score-info strong { font-family: 'Teko', sans-serif; font-size: 2.2rem; color: var(--primary); line-height: 1;}

        /* IMAGEN DEL JUGADOR */
        .player-img-container {
            width: 100%; max-width: 400px; aspect-ratio: 1/1; border-radius: 20px;
            background: #000; overflow: hidden; position: relative;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6); margin-bottom: 2rem; border: 2px solid var(--border-glow);
            display: flex; justify-content: center; align-items: center;
        }
        .player-img {
            width: 100%; height: 100%; object-fit: cover; object-position: top;
            filter: blur(40px); transform: scale(1.15); transition: filter 0.8s ease; display: none;
        }
        
        /* Spinner Interno mientras la API descarga la foto real */
        .api-loader { width: 30px; height: 30px; border: 3px solid rgba(255,255,255,0.1); border-top-color: var(--wc-red); border-radius: 50%; animation: spin 1s linear infinite; position: absolute; z-index: 5; }

        .overlay-status {
            position: absolute; inset: 0; background: rgba(0, 166, 81, 0.4); z-index: 10;
            display: flex; justify-content: center; align-items: center; opacity: 0; transition: 0.3s; pointer-events: none;
        }
        .overlay-status.success { opacity: 1; background: rgba(0, 166, 81, 0.4); }
        .overlay-status.fail { opacity: 1; background: rgba(227, 0, 63, 0.4); }
        .overlay-status i { width: 80px; height: 80px; color: white; filter: drop-shadow(0 0 10px rgba(0,0,0,0.5)); }

        /* INDICADOR DE INTENTOS */
        .attempts-bar { display: flex; gap: 10px; margin-bottom: 2rem; }
        .attempt-dot { width: 40px; height: 8px; background: rgba(255,255,255,0.1); border-radius: 4px; transition: 0.3s; }
        .attempt-dot.active { background: var(--primary); box-shadow: 0 0 10px rgba(255,255,255,0.5); }
        .attempt-dot.wrong { background: var(--wc-red); box-shadow: 0 0 10px rgba(227, 0, 63, 0.5); }

        /* BUSCADOR PREDICTIVO */
        .search-container { width: 100%; max-width: 500px; position: relative; }
        .search-input {
            width: 100%; background: rgba(0,0,0,0.3); border: 2px solid var(--border-glow);
            color: var(--primary); padding: 1.2rem; border-radius: 16px; font-size: 1.1rem;
            outline: none; transition: var(--transition); font-weight: 600; text-align: center;
        }
        .search-input:focus { border-color: var(--wc-blue); background: rgba(0,0,0,0.6); box-shadow: 0 0 20px rgba(0, 75, 135, 0.3); }
        
        .suggestions-box {
            position: absolute; top: 100%; left: 0; right: 0; background: rgba(15, 20, 35, 0.95);
            border: 1px solid var(--border-glow); border-radius: 12px; margin-top: 10px;
            max-height: 250px; overflow-y: auto; z-index: 50; display: none; backdrop-filter: blur(10px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.5);
        }
        .suggestions-box::-webkit-scrollbar { width: 6px; }
        .suggestions-box::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
        
        .suggestion-item {
            padding: 1rem; border-bottom: 1px solid var(--border-glow); cursor: pointer;
            font-weight: 600; transition: 0.2s; display: flex; align-items: center; gap: 10px;
        }
        .suggestion-item:hover { background: rgba(255,255,255,0.05); padding-left: 1.5rem; color: var(--wc-gold); }

        /* Botones de Acción */
        .btn-next {
            background: linear-gradient(135deg, var(--wc-blue), #003366); color: white; border: none;
            padding: 1.2rem 3rem; border-radius: 12px; font-weight: 800; font-size: 1.2rem;
            cursor: pointer; transition: var(--transition); margin-top: 2rem; display: none; text-transform: uppercase;
        }
        .btn-next:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0, 75, 135, 0.5); }

        .btn-submit {
            background: linear-gradient(135deg, var(--wc-gold), #B8860B); color: var(--wc-navy); border: none;
            padding: 1.2rem 3rem; border-radius: 12px; font-weight: 800; font-size: 1.2rem; display: none;
            cursor: pointer; transition: var(--transition); margin-top: 2rem; text-transform: uppercase; letter-spacing: 1px;
            box-shadow: 0 10px 20px rgba(212, 175, 55, 0.3);
        }
        .btn-submit.submitting { animation: pulseScore 1s infinite alternate; }

        /* ESTADO FINAL (Overlay) */
        .end-overlay {
            position: absolute; inset: 0; background: rgba(6, 9, 19, 0.95); backdrop-filter: blur(15px);
            z-index: 100; border-radius: 24px; display: none; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 2rem;
        }
        .end-overlay.active { display: flex; animation: fadeIn 0.5s ease; }
        .end-title { font-family: 'Teko', sans-serif; font-size: 4rem; color: var(--primary); line-height: 1; margin-bottom: 10px;}
        .end-score { font-family: 'Teko', sans-serif; font-size: 6rem; color: var(--wc-gold); line-height: 0.8; text-shadow: 0 0 30px rgba(255, 194, 14, 0.5); margin: 20px 0;}

        /* LEADERBOARD PANEL */
        .leaderboard-panel {
            background: var(--surface); border: 1px solid var(--border-glow);
            border-radius: 24px; padding: 2.5rem; backdrop-filter: blur(24px);
            display: flex; flex-direction: column; max-height: 800px;
        }
        .leaderboard-panel h2 { font-family: 'Teko', sans-serif; font-size: 2.8rem; text-transform: uppercase; margin-bottom: 0.5rem; color: var(--primary); display: flex; align-items: center; gap: 10px; line-height: 1;}
        .leaderboard-panel p { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 2rem; border-bottom: 1px solid var(--border-glow); padding-bottom: 1.5rem;}
        
        .lb-list { flex: 1; overflow-y: auto; padding-right: 5px; display: flex; flex-direction: column; gap: 10px; }
        .lb-list::-webkit-scrollbar { width: 4px; }
        .lb-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }

        .rank-card {
            display: flex; align-items: center; padding: 1rem; background: rgba(0,0,0,0.3);
            border-radius: 16px; border: 1px solid transparent; transition: var(--transition);
        }
        .rank-card.is-me { border-color: var(--wc-blue); background: rgba(0, 75, 135, 0.15); box-shadow: 0 0 15px rgba(0, 75, 135, 0.2); }

        .rank-pos { font-family: 'Teko', sans-serif; font-size: 2rem; width: 40px; color: var(--text-muted); line-height: 1; text-align: center;}
        .rank-card:nth-child(1) .rank-pos { color: var(--wc-gold); text-shadow: 0 0 10px rgba(255,194,14,0.5); font-size: 2.5rem; }
        
        .rank-user { flex: 1; font-weight: 600; font-size: 1rem; display: flex; align-items: center; gap: 10px; }
        .rank-avatar { width: 34px; height: 34px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 0.8rem; color: white; font-weight: 800; border: 2px solid rgba(255,255,255,0.15); }
        .rank-pts { font-family: 'Teko', sans-serif; font-size: 2.2rem; color: var(--primary); line-height: 1; }

        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes pulseScore { from { box-shadow: 0 10px 20px rgba(212, 175, 55, 0.3); } to { box-shadow: 0 10px 40px rgba(212, 175, 55, 0.7); } }

        @media (max-width: 768px) {
            .game-container { grid-template-columns: 1fr; padding: 0 5%; gap: 1.5rem; margin: 1.5rem auto;}
            .play-panel { padding: 1.5rem; }
            .player-img-container { max-width: 300px; }
            .round-info { font-size: 2rem; }
            .end-title { font-size: 3rem; }
            .end-score { font-size: 4.5rem; }
            .leaderboard-panel { padding: 1.5rem; }
        }
    </style>
</head>
<body>

    <div id="page-loader">
        <div class="loader-ring"></div>
        <p style="margin-top: 20px; font-family: 'Teko', sans-serif; font-size: 1.5rem; letter-spacing: 2px; color: var(--text-muted);">CALIBRANDO LENTES...</p>
    </div>

    <nav>
        <button class="btn-nav" onclick="goBack()"><i data-lucide="arrow-left"></i> Panel</button>
        <div class="logo-wc">Blur <span>26</span></div>
        <div style="width: 80px;"></div>
    </nav>

    <div class="game-container">
        
        <div class="play-panel" id="arena">
            
            <div class="end-overlay" id="end-screen">
                <div class="end-title">RONDA COMPLETADA</div>
                <p style="color: var(--text-muted); font-size: 1.1rem; margin-top: 10px;">Puntuación total de la jornada:</p>
                <div class="end-score" id="final-score-display">0</div>
                <p style="color: var(--wc-green); font-size: 0.95rem; display: none;" id="new-record-msg">¡NUEVO RÉCORD PERSONAL!</p>
                <button class="btn-next" style="display:flex; margin-top: 1rem;" onclick="startNewSession()"><i data-lucide="rotate-cw"></i> JUGAR OTRA VEZ</button>
            </div>

            <div class="hud-top">
                <div class="round-info">Jugador <span id="current-round-text">1</span>/6</div>
                <div class="score-info">
                    <span>Puntuación</span>
                    <strong id="live-score">0</strong>
                </div>
            </div>

            <div class="player-img-container">
                <div class="api-loader" id="api-loader"></div>
                <img id="player-image" src="" alt="Jugador Oculto" class="player-img">
                <div class="overlay-status" id="overlay-status">
                    <i data-lucide="check-circle" id="icon-success" style="display:none;"></i>
                    <i data-lucide="x-circle" id="icon-fail" style="display:none;"></i>
                </div>
            </div>

            <div class="attempts-bar" id="attempts-bar">
                <div class="attempt-dot active"></div>
                <div class="attempt-dot"></div>
                <div class="attempt-dot"></div>
                <div class="attempt-dot"></div>
                <div class="attempt-dot"></div>
            </div>

            <div class="search-container" id="search-area">
                <input type="text" class="search-input" id="search-input" placeholder="Escribe el nombre del jugador..." autocomplete="off">
                <div class="suggestions-box" id="suggestions-box"></div>
            </div>

            <button class="btn-next" id="btn-next" onclick="nextRound()">SIGUIENTE JUGADOR <i data-lucide="arrow-right"></i></button>
            <button class="btn-submit" id="btn-submit" onclick="submitGameToVAR()">ENVIAR MARCADOR AL VAR <i data-lucide="shield-check"></i></button>

        </div>

        <div class="leaderboard-panel">
            <h2><i data-lucide="eye" style="color: var(--wc-blue);"></i> Ojo de Halcón</h2>
            <p>Clasificación basada en la mejor puntuación de una ronda (6 jugadores) de cada miembro del viaje.</p>
            
            <div class="lb-list" id="leaderboard-container">
                <div style="text-align: center; color: var(--text-muted); margin-top: 3rem;">
                    <div class="loader-ring" style="width: 30px; height: 30px; margin: 0 auto 15px; border-width: 2px;"></div>
                    <p>Sincronizando récords...</p>
                </div>
            </div>
        </div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, collection, query, where, onSnapshot, orderBy } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // ==========================================
        // FIREBASE CONFIG
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyDRkUJnDLzknFz3KOnPEm4UFsgf6R4z1Uk",
            authDomain: "interra26-22ecd.firebaseapp.com",
            projectId: "interra26-22ecd",
            storageBucket: "interra26-22ecd.firebasestorage.app",
            messagingSenderId: "960505222050",
            appId: "1:960505222050:web:a9943c6fec9532141f98fb"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // ID DE VIAJE
        const urlParams = new URLSearchParams(window.location.search);
        let tripId = urlParams.get('id');
        if (!tripId) {
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                if (key && key.startsWith('lastTipTime_')) { tripId = key.replace('lastTipTime_', ''); break; }
            }
        }
        if (!tripId) tripId = "Mundial_BlurPublic"; 

        window.goBack = () => {
            if (tripId !== "Mundial_BlurPublic") window.location.href = `viaje.html?id=${tripId}`;
            else window.location.href = 'panel.html';
        }

        // ==========================================
        // LÓGICA DE JUGADORES (CSV NATIVO)
        // ==========================================
        let PLAYERS_DB = []; 
        let currentUser = null;
        let userProfile = { nombre: 'Jugador', avatarColor: '#004B87' };
        let userMaxScore = 0;

        // Estado del Juego (5 Intentos: 500, 400, 300, 200, 100)
        const BLUR_STAGES = ['40px', '25px', '15px', '8px', '3px']; 
        const POINTS_STAGE = [500, 400, 300, 200, 100];
        
        let sessionPlayers = [];
        let currentRound = 0; // 0 a 5
        let currentAttempt = 0; // 0 a 4
        let sessionScore = 0;
        let isRoundLocked = false;

        // ==========================================
        // INIT
        // ==========================================
        onAuthStateChanged(auth, async (user) => {
            if (!user) { window.location.href = 'registro.html'; return; }
            currentUser = user;
            
            await fetchUserData();
            await loadCSVData(); // Lee los 225 nombres del CSV
            setupLeaderboard();

            startNewSession();

            const loader = document.getElementById('page-loader');
            loader.style.opacity = '0'; setTimeout(() => loader.style.display = 'none', 600);
        });

        async function fetchUserData() {
            try {
                const uSnap = await getDoc(doc(db, "usuarios", currentUser.uid));
                if (uSnap.exists()) {
                    userProfile.nombre = uSnap.data().nombre || currentUser.email.split('@')[0];
                    userProfile.avatarColor = uSnap.data().avatarColor || '#004B87';
                }
                const sDocId = `${tripId}_${currentUser.uid}`;
                const sSnap = await getDoc(doc(db, "worldcup_blur_scores", sDocId));
                if (sSnap.exists()) userMaxScore = sSnap.data().maxScore || 0;
            } catch (e) { console.warn("Modo offline detectado."); }
        }

        async function loadCSVData() {
            try {
                const response = await fetch('worldcupgame2.csv');
                if (!response.ok) throw new Error("CSV no encontrado");
                
                const text = await response.text();
                const lines = text.split('\n');
                
                PLAYERS_DB = [];
                for(let i=1; i<lines.length; i++) { // Salta header
                    if(!lines[i].trim()) continue;
                    const name = lines[i].split(',')[0].replace(/"/g,'').trim();
                    if(name) PLAYERS_DB.push({ name: name });
                }
                if(PLAYERS_DB.length < 6) throw new Error("CSV pequeño");
            } catch(e) {
                console.log("No se pudo cargar el CSV. Cargando respaldo interno de emergencia...");
                // Respaldo por si suben mal el CSV
                PLAYERS_DB = [{name:"Lionel Messi"}, {name:"Kylian Mbappé"}, {name:"Erling Haaland"}, {name:"Vinícius Júnior"}, {name:"Jude Bellingham"}, {name:"Kevin De Bruyne"}, {name:"Luka Modrić"}, {name:"Harry Kane"}];
            }
        }

        // ==========================================
        // MOTOR DE IMÁGENES (WIKIPEDIA API AJAX)
        // ==========================================
        async function fetchPlayerImageFromWiki(playerName) {
            const encoded = encodeURIComponent(playerName);
            const url = `https://es.wikipedia.org/w/api.php?action=query&titles=${encoded}&prop=pageimages&format=json&pithumbsize=600&origin=*`;
            
            try {
                const res = await fetch(url);
                const data = await res.json();
                const pages = data.query.pages;
                const pageId = Object.keys(pages)[0];
                
                if (pages[pageId].thumbnail) {
                    return pages[pageId].thumbnail.source;
                } else {
                    // Si no lo encuentra en español, prueba en inglés
                    const urlEn = `https://en.wikipedia.org/w/api.php?action=query&titles=${encoded}&prop=pageimages&format=json&pithumbsize=600&origin=*`;
                    const resEn = await fetch(urlEn);
                    const dataEn = await resEn.json();
                    const pagesEn = dataEn.query.pages;
                    const pageIdEn = Object.keys(pagesEn)[0];
                    if(pagesEn[pageIdEn].thumbnail) return pagesEn[pageIdEn].thumbnail.source;
                }
            } catch(e) {
                console.log("Error API Wiki", e);
            }
            // Si Wikipedia no tiene foto, silueta por defecto
            return "https://upload.wikimedia.org/wikipedia/commons/thumb/1/12/User_icon_2.svg/480px-User_icon_2.svg.png";
        }

        // ==========================================
        // MECÁNICAS DEL JUEGO
        // ==========================================
        window.startNewSession = function() {
            document.getElementById('end-screen').classList.remove('active');
            document.getElementById('new-record-msg').style.display = 'none';
            
            // Elegir 6 jugadores aleatorios para la ronda
            let shuffled = [...PLAYERS_DB].sort(() => 0.5 - Math.random());
            sessionPlayers = shuffled.slice(0, 6);
            
            currentRound = 0;
            sessionScore = 0;
            document.getElementById('live-score').innerText = sessionScore;
            
            loadRound();
        }

        async function loadRound() {
            isRoundLocked = false;
            currentAttempt = 0;
            
            document.getElementById('current-round-text').innerText = currentRound + 1;
            document.getElementById('search-area').style.display = 'block';
            document.getElementById('btn-next').style.display = 'none';
            document.getElementById('btn-submit').style.display = 'none';
            document.getElementById('search-input').value = '';
            document.getElementById('suggestions-box').style.display = 'none';
            document.getElementById('search-input').disabled = false;
            
            // Reset visuales
            const overlay = document.getElementById('overlay-status');
            overlay.className = 'overlay-status';
            document.getElementById('icon-success').style.display = 'none';
            document.getElementById('icon-fail').style.display = 'none';

            const dots = document.querySelectorAll('.attempt-dot');
            dots.forEach(d => { d.className = 'attempt-dot'; });
            dots[0].classList.add('active');

            // Lógica asíncrona de la imagen
            const imgEl = document.getElementById('player-image');
            const loader = document.getElementById('api-loader');
            
            imgEl.style.display = 'none';
            loader.style.display = 'block';
            
            const playerUrl = await fetchPlayerImageFromWiki(sessionPlayers[currentRound].name);
            
            imgEl.src = playerUrl;
            imgEl.style.filter = `blur(${BLUR_STAGES[0]})`;
            
            imgEl.onload = () => {
                loader.style.display = 'none';
                imgEl.style.display = 'block';
                document.getElementById('search-input').focus();
            };
        }

        window.nextRound = function() {
            currentRound++;
            if (currentRound >= 6) {
                // Finalizó los 6 jugadores
                document.getElementById('search-area').style.display = 'none';
                document.getElementById('btn-next').style.display = 'none';
                document.getElementById('btn-submit').style.display = 'flex';
            } else {
                loadRound();
            }
        }

        window.submitGameToVAR = async function() {
            const btn = document.getElementById('btn-submit');
            btn.classList.add('submitting');
            btn.innerHTML = '<div class="loader-ring" style="width:24px; height:24px; border-width:2px; border-top-color:var(--wc-navy);"></div> REGISTRANDO...';
            btn.disabled = true;

            if (sessionScore > userMaxScore) {
                await saveMaxScore(sessionScore);
                document.getElementById('new-record-msg').style.display = 'block';
            }

            setTimeout(() => {
                document.getElementById('final-score-display').innerText = sessionScore;
                document.getElementById('end-screen').classList.add('active');
                confetti({ particleCount: 200, spread: 90, origin: { y: 0.6 }, colors: ['#004B87', '#E3003F', '#ffffff'] });
                
                btn.style.display = 'none';
                btn.disabled = false;
                btn.classList.remove('submitting');
                btn.innerHTML = 'ENVIAR MARCADOR AL VAR <i data-lucide="shield-check"></i>';
            }, 1000);
        }

        async function saveMaxScore(newScore) {
            userMaxScore = newScore;
            const scoreDocId = `${tripId}_${currentUser.uid}`;
            const ref = doc(db, "worldcup_blur_scores", scoreDocId);

            try {
                await setDoc(ref, {
                    uid: currentUser.uid,
                    tripId: tripId,
                    userName: userProfile.nombre,
                    avatarColor: userProfile.avatarColor,
                    maxScore: newScore,
                    lastUpdate: new Date().getTime()
                }, { merge: true });
            } catch(e) {
                console.error("Error sincronizando", e);
            }
        }

        // ==========================================
        // BUSCADOR PREDICTIVO
        // ==========================================
        const inputEl = document.getElementById('search-input');
        const suggBox = document.getElementById('suggestions-box');

        inputEl.addEventListener('input', function() {
            if (isRoundLocked) return;
            const val = this.value.toLowerCase().trim();
            suggBox.innerHTML = '';
            
            if (val.length < 2) { suggBox.style.display = 'none'; return; }

            const matches = PLAYERS_DB.filter(p => p.name.toLowerCase().includes(val)).slice(0, 8); 

            if (matches.length > 0) {
                matches.forEach(m => {
                    let div = document.createElement('div');
                    div.className = 'suggestion-item';
                    div.innerHTML = `<i data-lucide="user" style="width:16px;"></i> ${m.name}`;
                    div.onclick = () => submitGuess(m.name);
                    suggBox.appendChild(div);
                });
                lucide.createIcons();
                suggBox.style.display = 'block';
            } else {
                suggBox.style.display = 'none';
            }
        });

        document.addEventListener('click', (e) => {
            if(!document.getElementById('search-area').contains(e.target)) suggBox.style.display = 'none';
        });

        function submitGuess(guessedName) {
            if (isRoundLocked) return;
            suggBox.style.display = 'none';
            inputEl.value = guessedName;
            
            const targetName = sessionPlayers[currentRound].name;
            const isCorrect = guessedName.toLowerCase() === targetName.toLowerCase();

            const dots = document.querySelectorAll('.attempt-dot');
            const imgEl = document.getElementById('player-image');

            if (isCorrect) {
                // ÉXITO
                isRoundLocked = true;
                sessionScore += POINTS_STAGE[currentAttempt];
                document.getElementById('live-score').innerText = sessionScore;
                
                imgEl.style.filter = 'blur(0px)';
                dots[currentAttempt].classList.add('active'); 
                
                const overlay = document.getElementById('overlay-status');
                overlay.className = 'overlay-status success';
                document.getElementById('icon-success').style.display = 'block';
                
                document.getElementById('search-area').style.display = 'none';
                
                // Si es el último jugador (ronda 6), mostrar botón submit. Si no, botón next.
                if (currentRound === 5) document.getElementById('btn-submit').style.display = 'flex';
                else document.getElementById('btn-next').style.display = 'flex';
                
            } else {
                // FALLO
                dots[currentAttempt].classList.remove('active');
                dots[currentAttempt].classList.add('wrong');
                
                document.getElementById('arena').style.animation = 'shake 0.4s';
                setTimeout(() => document.getElementById('arena').style.animation = '', 400);

                currentAttempt++;
                
                if (currentAttempt >= 5) {
                    // SE ACABARON LOS INTENTOS -> REVELAR FOTO
                    isRoundLocked = true;
                    imgEl.style.filter = 'blur(0px)';
                    
                    const overlay = document.getElementById('overlay-status');
                    overlay.className = 'overlay-status fail';
                    document.getElementById('icon-fail').style.display = 'block';
                    
                    inputEl.value = `Era: ${targetName}`;
                    inputEl.disabled = true;
                    
                    if (currentRound === 5) document.getElementById('btn-submit').style.display = 'flex';
                    else document.getElementById('btn-next').style.display = 'flex';

                } else {
                    // SIGUIENTE INTENTO -> REDUCIR BLUR
                    dots[currentAttempt].classList.add('active');
                    imgEl.style.filter = `blur(${BLUR_STAGES[currentAttempt]})`;
                    inputEl.value = '';
                    inputEl.focus();
                }
            }
        }

        // ==========================================
        // LEADERBOARD TV BROADCAST
        // ==========================================
        function setupLeaderboard() {
            const scoresRef = collection(db, "worldcup_blur_scores");
            const q = query(scoresRef, where("tripId", "==", tripId), orderBy("maxScore", "desc"));

            try {
                onSnapshot(q, (snapshot) => {
                    const container = document.getElementById('leaderboard-container');
                    container.innerHTML = '';

                    if (snapshot.empty) {
                        container.innerHTML = `<div style="text-align:center; color:var(--text-muted); margin-top:2rem;">Aún no hay puntuaciones en el ranking.</div>`;
                        return;
                    }

                    let rank = 1;
                    snapshot.forEach((doc) => {
                        const data = doc.data();
                        const isMe = data.uid === currentUser.uid;
                        const initial = data.userName ? data.userName.charAt(0).toUpperCase() : '?';

                        container.innerHTML += `
                            <div class="rank-card ${isMe ? 'is-me' : ''}">
                                <div class="rank-pos">${rank}</div>
                                <div class="rank-user">
                                    <div class="rank-avatar" style="background-color: ${data.avatarColor || 'var(--wc-blue)'}">${initial}</div>
                                    ${data.userName} ${isMe ? '<span style="font-size:0.6rem; background: var(--wc-red); color: white; padding:2px 6px; border-radius:4px; margin-left: 5px;">TÚ</span>' : ''}
                                </div>
                                <div class="rank-pts">${data.maxScore}</div>
                            </div>
                        `;
                        rank++;
                    });
                }, (error) => {
                    document.getElementById('leaderboard-container').innerHTML = `
                        <div style="text-align:center; color:var(--text-muted); margin-top:2rem;">
                            <div class="loader-ring" style="width: 30px; height: 30px; margin: 0 auto 15px; border-width: 2px;"></div>
                            <p>Sincronizando marcador...</p>
                            <p style="font-size: 0.75rem; opacity: 0.6; margin-top: 5px;">(Firebase construyendo índices)</p>
                        </div>`;
                });
            } catch(e) {
                document.getElementById('leaderboard-container').innerHTML = `<div style="text-align:center; color:var(--text-muted); margin-top:2rem;">Error conectando al marcador.</div>`;
            }
        }

        lucide.createIcons();
    </script>
</body>
</html>
