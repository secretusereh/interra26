<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bingo World Cup 26 | Interra-hub</title>
    
    <link rel="icon" type="image/png" href="interrahublogo.PNG">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;800&family=Teko:wght@500;700&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        /* =========================================
           PALETA ELEGANTE WORLD CUP 26
           ========================================= */
        :root {
            --wc-blue: #00529F;
            --wc-red: #E3003F;
            --wc-green: #00A651;
            --wc-yellow: #FFC20E;
            --pitch-black: #050505;
            --deep-navy: #0a0f1a;
            --surface-glass: rgba(20, 25, 35, 0.6);
            --primary: #ffffff;
            --text-muted: #8b9bb4;
            --border-subtle: rgba(255, 255, 255, 0.06);
            --transition: 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Sora', sans-serif; }

        /* Fondo Minimalista y Premium */
        body {
            background-color: var(--pitch-black);
            background-image: radial-gradient(circle at 50% 0%, rgba(0, 82, 159, 0.15), transparent 50%);
            color: var(--primary);
            min-height: 100vh;
            overflow-x: hidden;
            background-attachment: fixed;
        }

        /* Navbar Limpia */
        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 1.2rem 5%; background: rgba(5, 5, 5, 0.85); backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-subtle); position: sticky; top: 0; z-index: 100;
        }
        .btn-nav { background: transparent; color: var(--text-muted); border: none; cursor: pointer; display: flex; align-items: center; gap: 8px; font-weight: 600; transition: var(--transition); }
        .btn-nav:hover { color: var(--primary); transform: translateX(-4px); }
        .logo-wc { display: flex; align-items: center; gap: 8px; font-family: 'Teko', sans-serif; font-size: 2rem; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--primary); }
        .logo-wc span { color: var(--wc-red); }

        /* Loader a prueba de fallos */
        #page-loader {
            position: fixed; inset: 0; background: var(--pitch-black); z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center; transition: opacity 0.5s ease;
        }
        .loader-ring {
            width: 50px; height: 50px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: var(--wc-blue);
            border-right-color: var(--wc-red);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        /* Layout Main */
        .game-container {
            max-width: 1300px; margin: 3rem auto; padding: 0 5%;
            display: grid; grid-template-columns: 1fr 380px; gap: 2.5rem;
        }

        @media (max-width: 1024px) {
            .game-container { grid-template-columns: 1fr; margin: 2rem auto; }
        }

        /* Tablero de Bingo */
        .board-section {
            background: var(--surface-glass);
            border: 1px solid var(--border-subtle);
            border-radius: 20px;
            padding: 2.5rem;
            backdrop-filter: blur(20px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            position: relative;
        }

        .board-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 2.5rem; }
        .board-header h1 { font-family: 'Teko', sans-serif; font-size: 3rem; line-height: 1; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
        .board-header p { color: var(--text-muted); font-size: 0.95rem; font-weight: 300; }
        
        .score-display {
            background: rgba(0, 0, 0, 0.4); 
            border: 1px solid var(--border-subtle);
            padding: 0.8rem 2rem; border-radius: 12px; text-align: center;
        }
        .score-display span { display: block; font-size: 0.75rem; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 2px;}
        .score-display strong { font-size: 2.5rem; font-family: 'Teko', sans-serif; line-height: 1.1; color: var(--primary); }

        .bingo-grid {
            display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px;
        }

        .bingo-cell {
            aspect-ratio: 1 / 1;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            display: flex; justify-content: center; align-items: center; text-align: center;
            padding: 10px; cursor: pointer; transition: var(--transition);
            position: relative; overflow: hidden;
            user-select: none;
        }

        .bingo-cell:hover:not(.checked):not(.free-space) {
            background: rgba(255, 255, 255, 0.05); border-color: rgba(255, 255, 255, 0.2); transform: translateY(-3px);
        }

        .bingo-cell.checked {
            background: var(--wc-blue);
            border-color: var(--wc-blue);
            box-shadow: 0 5px 15px rgba(0, 82, 159, 0.4);
            transform: scale(0.96);
        }

        .bingo-cell.checked::after {
            content: ''; position: absolute; inset: 0; 
            background: linear-gradient(135deg, transparent, rgba(255,255,255,0.1));
            pointer-events: none;
        }

        .bingo-cell.free-space {
            background: var(--primary);
            color: var(--pitch-black); font-weight: 800; border: none; cursor: default;
        }

        .bingo-cell.winning-cell {
            background: var(--wc-green);
            border-color: var(--wc-green);
            box-shadow: 0 0 20px rgba(0, 166, 81, 0.4);
            animation: pulseWin 2s infinite;
        }

        @keyframes pulseWin {
            0% { opacity: 1; }
            50% { opacity: 0.8; }
            100% { opacity: 1; }
        }

        .cell-text {
            font-size: 0.8rem; font-weight: 600; z-index: 2; word-break: break-word; line-height: 1.3;
        }
        .bingo-cell.free-space .cell-text { font-size: 0.9rem; text-transform: uppercase; }

        /* Leaderboard */
        .leaderboard-section {
            background: var(--surface-glass); border: 1px solid var(--border-subtle);
            border-radius: 20px; padding: 2rem; backdrop-filter: blur(20px);
            display: flex; flex-direction: column; max-height: 800px;
        }

        .leaderboard-section h2 {
            font-family: 'Teko', sans-serif; font-size: 2.2rem; display: flex; align-items: center; gap: 10px;
            text-transform: uppercase; border-bottom: 1px solid var(--border-subtle); padding-bottom: 1rem; margin-bottom: 1rem;
            color: var(--primary); letter-spacing: 1px;
        }

        .table-container { flex: 1; overflow-y: auto; padding-right: 5px; }
        .table-container::-webkit-scrollbar { width: 4px; }
        .table-container::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }

        .rank-row {
            display: flex; align-items: center; padding: 1rem;
            background: rgba(0,0,0,0.2); border-radius: 12px; margin-bottom: 10px;
            border: 1px solid transparent; transition: var(--transition);
        }
        .rank-row:hover { background: rgba(255,255,255,0.03); border-color: var(--border-subtle); }
        
        .rank-row.is-me { border-color: var(--wc-red); background: rgba(227, 0, 63, 0.05); }

        .rank-num { font-family: 'Teko', sans-serif; font-size: 1.5rem; font-weight: 700; width: 35px; color: var(--text-muted); text-align: left; }
        .rank-row:nth-child(1) .rank-num { color: var(--wc-yellow); font-size: 1.8rem; }
        .rank-row:nth-child(2) .rank-num { color: #E2E8F0; font-size: 1.7rem; }
        .rank-row:nth-child(3) .rank-num { color: #D97706; font-size: 1.6rem; }

        .rank-user { flex: 1; font-weight: 600; display: flex; align-items: center; gap: 12px; font-size: 0.95rem; }
        .user-avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 0.85rem; color: white; font-weight: 800; }
        
        .rank-score { font-family: 'Teko', sans-serif; font-size: 1.8rem; font-weight: 700; color: var(--primary); }

        .btn-save {
            width: 100%; background: var(--primary); color: var(--pitch-black); border: none;
            padding: 1.2rem; border-radius: 12px; font-weight: 800; font-size: 1rem; margin-top: 2rem;
            cursor: pointer; transition: var(--transition); display: flex; justify-content: center; align-items: center; gap: 10px;
        }
        .btn-save:hover { background: var(--text-muted); color: var(--primary); transform: translateY(-2px); }
        .btn-save.unsaved { background: var(--wc-red); color: white; }

        /* Adaptaciones Móviles */
        @media (max-width: 768px) {
            .board-header { flex-direction: column; align-items: flex-start; gap: 15px; }
            .score-display { width: 100%; display: flex; justify-content: space-between; align-items: center; padding: 0.8rem 1.5rem; }
            .score-display span { display: inline; margin-right: 10px; }
            .bingo-grid { gap: 6px; }
            .bingo-cell { padding: 5px; border-radius: 8px; }
            .cell-text { font-size: 0.6rem; }
            .board-section { padding: 1.5rem; }
            .board-header h1 { font-size: 2.2rem; }
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="page-loader">
        <div class="loader-ring"></div>
        <p style="margin-top: 20px; font-family: 'Teko', sans-serif; font-size: 1.5rem; letter-spacing: 2px; color: var(--text-muted);">INICIALIZANDO ENTORNO...</p>
    </div>

    <nav>
        <button class="btn-nav" onclick="goBack()">
            <i data-lucide="arrow-left"></i> Panel
        </button>
        <div class="logo-wc">
            World Cup <span>26</span>
        </div>
        <div style="width: 70px;"></div> </nav>

    <div class="game-container">
        
        <div class="board-section">
            <div class="board-header">
                <div>
                    <h1>Predicciones Oficiales</h1>
                    <p>Marca los eventos a medida que ocurren en los partidos.</p>
                </div>
                <div class="score-display">
                    <span>Puntos</span>
                    <strong id="my-score">0</strong>
                </div>
            </div>

            <div class="bingo-grid" id="bingo-board">
                </div>

            <button class="btn-save" id="btn-save-progress" onclick="saveProgress()">
                <i data-lucide="save"></i> GUARDAR PROGRESO
            </button>
        </div>

        <div class="leaderboard-section">
            <h2><i data-lucide="bar-chart-2"></i> Clasificación</h2>
            <p style="color: var(--text-muted); font-size: 0.85rem; margin-bottom: 1.5rem; font-weight: 300;">10 pts por acierto, 50 pts por línea completada.</p>
            
            <div class="table-container" id="leaderboard-container">
                <div style="text-align: center; color: var(--text-muted); margin-top: 3rem;">
                    <div class="loader-ring" style="width: 30px; height: 30px; margin: 0 auto 15px; border-width: 2px;"></div>
                    <p style="font-weight: 600;">Cargando base de datos...</p>
                </div>
            </div>
        </div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, collection, query, where, onSnapshot, orderBy } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDRkUJnDLzknFz3KOnPEm4UFsgf6R4z1Uk",
            authDomain: "interra26-22ecd.firebaseapp.com",
            projectId: "interra26-22ecd",
            storageBucket: "interra26-22ecd.firebasestorage.app",
            messagingSenderId: "960505222050",
            appId: "1:960505222050:web:a9943c6fec9532141f98fb"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // ==========================================
        // SISTEMA DE AUTODETECCIÓN INTELIGENTE DE ID
        // ==========================================
        const urlParams = new URLSearchParams(window.location.search);
        let tripId = urlParams.get('id');

        if (!tripId) {
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                if (key && key.startsWith('lastTipTime_')) { tripId = key.replace('lastTipTime_', ''); break; }
                if (key && key.startsWith('financeTourDone_')) { tripId = key.replace('financeTourDone_', ''); break; }
            }
        }

        if (!tripId) {
            tripId = "Mundial2026_SalaGlobal";
            console.warn("Se te ha asignado a la sala global por falta de ID de viaje.");
        }

        window.goBack = () => {
            if (tripId !== "Mundial2026_SalaGlobal") window.location.href = `viaje.html?id=${tripId}`;
            else window.location.href = 'panel.html';
        }

        // Banco de Eventos Oficial
        const EVENT_POOL = [
            "Gol de chilena", "Penalti parado", "Revisión larga del VAR", "0-0 al descanso",
            "Gol de falta directa", "Tarjeta roja directa", "Hat-trick", "Gol en el descuento (+90')",
            "Tanda de penaltis", "Remontada", "Gol anulado", "Gol en propia puerta",
            "Entrenador amonestado", "Lesión antes del min 20", "Lágrimas en el himno", "Gol desde fuera del área",
            "Palo o larguero", "Empate a goles", "Gol de un defensa", "Asistencia de tacón", 
            "Jugador sin camiseta", "Parada a bocajarro", "Gol olímpico", "Partido de +5 goles",
            "Árbitro sustituido", "Corte de emisión", "Falso 9 anota", "Error del portero",
            "Gol en primeros 5 min", "Equipo revelación gana", "Polémica arbitral", "Gol de cabeza"
        ];

        let currentUser = null;
        let userProfile = { nombre: 'Invitado', avatarColor: '#00529F' };
        let bingoBoard = [];
        let currentScore = 0;
        let isSaving = false;

        // 1. Inicialización Totalmente Segura con Try/Catch/Finally
        onAuthStateChanged(auth, async (user) => {
            try {
                if (user) {
                    currentUser = user;
                    await loadUserProfile();
                    await initializeGame();
                    setupLeaderboardListener();
                } else {
                    window.location.href = 'registro.html';
                }
            } catch (error) {
                console.error("Error crítico durante la inicialización:", error);
                // Si falla Firebase, permitimos jugar en local (crea un tablero temporal)
                generateNewBoard();
                renderBoard();
            } finally {
                // ESTO GARANTIZA QUE EL LOADER SE QUITE SÍ O SÍ
                const loader = document.getElementById('page-loader');
                if (loader) {
                    loader.style.opacity = '0';
                    setTimeout(() => loader.style.display = 'none', 500);
                }
            }
        });

        async function loadUserProfile() {
            try {
                const snap = await getDoc(doc(db, "usuarios", currentUser.uid));
                if (snap.exists()) {
                    const data = snap.data();
                    userProfile.nombre = data.nombre || currentUser.email.split('@')[0];
                    userProfile.avatarColor = data.avatarColor || '#00529F';
                }
            } catch (e) { console.warn("Permisos denegados para leer perfil de usuario. Usando fallback."); }
        }

        async function initializeGame() {
            const docId = `${tripId}_${currentUser.uid}`;
            const boardRef = doc(db, "worldcup_bingo", docId);
            
            let docSnap;
            try {
                docSnap = await getDoc(boardRef);
            } catch (e) {
                console.warn("Permisos denegados o red fallida en worldcup_bingo. Iniciando modo local.");
            }

            if (docSnap && docSnap.exists()) {
                const data = docSnap.data();
                bingoBoard = data.board;
                currentScore = data.score || 0;
            } else {
                generateNewBoard();
                currentScore = 10;
                await saveToFirebase(true); // Intento silencioso
            }

            renderBoard();
        }

        function generateNewBoard() {
            let shuffled = [...EVENT_POOL].sort(() => 0.5 - Math.random());
            let selected = shuffled.slice(0, 24);
            
            bingoBoard = [];
            let eventIndex = 0;

            for (let i = 0; i < 25; i++) {
                if (i === 12) {
                    bingoBoard.push({ id: 12, text: "MUNDIAL 2026", checked: true, isFree: true });
                } else {
                    bingoBoard.push({ id: i, text: selected[eventIndex], checked: false, isFree: false });
                    eventIndex++;
                }
            }
        }

        function renderBoard() {
            const grid = document.getElementById('bingo-board');
            grid.innerHTML = '';

            bingoBoard.forEach((cell, index) => {
                const cellEl = document.createElement('div');
                cellEl.className = `bingo-cell ${cell.checked ? 'checked' : ''} ${cell.isFree ? 'free-space checked' : ''}`;
                cellEl.innerHTML = `<span class="cell-text">${cell.text}</span>`;
                
                if (!cell.isFree) {
                    cellEl.onclick = () => toggleCell(index, cellEl);
                }
                
                grid.appendChild(cellEl);
            });

            calculateScoreAndVisuals();
        }

        function toggleCell(index, element) {
            bingoBoard[index].checked = !bingoBoard[index].checked;
            
            if (bingoBoard[index].checked) {
                element.classList.add('checked');
            } else {
                element.classList.remove('checked');
                element.classList.remove('winning-cell');
            }

            calculateScoreAndVisuals();
            
            const btn = document.getElementById('btn-save-progress');
            btn.classList.add('unsaved');
            btn.innerHTML = '<i data-lucide="alert-circle"></i> CAMBIOS SIN GUARDAR';
            lucide.createIcons();
        }

        function calculateScoreAndVisuals() {
            document.querySelectorAll('.bingo-cell').forEach(el => el.classList.remove('winning-cell'));
            
            let linesCompleted = 0;
            let cellsChecked = 0;
            const winningIndices = new Set();

            for (let r = 0; r < 5; r++) {
                let rowChecked = true;
                for (let c = 0; c < 5; c++) { if (!bingoBoard[r * 5 + c].checked) rowChecked = false; }
                if (rowChecked) { linesCompleted++; for (let c = 0; c < 5; c++) winningIndices.add(r * 5 + c); }
            }

            for (let c = 0; c < 5; c++) {
                let colChecked = true;
                for (let r = 0; r < 5; r++) { if (!bingoBoard[r * 5 + c].checked) colChecked = false; }
                if (colChecked) { linesCompleted++; for (let r = 0; r < 5; r++) winningIndices.add(r * 5 + c); }
            }

            let diag1 = true; let diag2 = true;
            for (let i = 0; i < 5; i++) {
                if (!bingoBoard[i * 5 + i].checked) diag1 = false;
                if (!bingoBoard[i * 5 + (4 - i)].checked) diag2 = false;
            }
            if (diag1) { linesCompleted++; for (let i = 0; i < 5; i++) winningIndices.add(i * 5 + i); }
            if (diag2) { linesCompleted++; for (let i = 0; i < 5; i++) winningIndices.add(i * 5 + (4 - i)); }

            const cells = document.querySelectorAll('.bingo-cell');
            winningIndices.forEach(idx => cells[idx].classList.add('winning-cell'));

            bingoBoard.forEach(c => { if(c.checked) cellsChecked++; });

            const oldScore = currentScore;
            currentScore = (cellsChecked * 10) + (linesCompleted * 50);
            if (cellsChecked === 25) currentScore += 250;

            document.getElementById('my-score').innerText = currentScore;

            if (currentScore > oldScore && oldScore !== 0 && linesCompleted > 0 && !isSaving) {
                confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 }, colors: ['#00529F', '#E3003F', '#ffffff'] });
            }
        }

        window.saveProgress = async function() {
            if (isSaving) return;
            isSaving = true;
            const btn = document.getElementById('btn-save-progress');
            btn.innerHTML = '<i data-lucide="loader-2" style="animation: spin 2s linear infinite;"></i> GUARDANDO...';

            await saveToFirebase(false);

            btn.classList.remove('unsaved');
            btn.style.background = 'var(--wc-green)';
            btn.style.color = 'white';
            btn.innerHTML = '<i data-lucide="check"></i> GUARDADO';
            lucide.createIcons();
            
            setTimeout(() => {
                btn.style.background = '';
                btn.style.color = '';
                btn.innerHTML = '<i data-lucide="save"></i> GUARDAR PROGRESO';
                isSaving = false;
                lucide.createIcons();
            }, 2000);
        }

        async function saveToFirebase(isSilent) {
            if(!currentUser) return;
            const docId = `${tripId}_${currentUser.uid}`;
            const boardRef = doc(db, "worldcup_bingo", docId);
            
            try {
                await setDoc(boardRef, {
                    tripId: tripId,
                    uid: currentUser.uid,
                    userName: userProfile.nombre,
                    avatarColor: userProfile.avatarColor,
                    board: bingoBoard,
                    score: currentScore,
                    timestamp: new Date().getTime()
                }, { merge: true });
            } catch (error) {
                console.error("Error guardando en Firebase:", error);
                if(!isSilent) alert("No se pudo guardar online, pero tu cartón se mantiene visualmente.");
            }
        }

        function setupLeaderboardListener() {
            const bingoRef = collection(db, "worldcup_bingo");
            const q = query(bingoRef, where("tripId", "==", tripId), orderBy("score", "desc"));

            try {
                onSnapshot(q, (snapshot) => {
                    const container = document.getElementById('leaderboard-container');
                    container.innerHTML = '';

                    if (snapshot.empty) {
                        container.innerHTML = `
                            <div style="text-align: center; color: var(--text-muted); margin-top: 2rem;">
                                <p>Aún no hay clasificados.</p>
                            </div>`;
                        return;
                    }

                    let rank = 1;
                    snapshot.forEach((doc) => {
                        const data = doc.data();
                        const isMe = data.uid === currentUser.uid;
                        const initial = data.userName ? data.userName.charAt(0).toUpperCase() : '?';

                        container.innerHTML += `
                            <div class="rank-row ${isMe ? 'is-me' : ''}">
                                <div class="rank-num">${rank}</div>
                                <div class="rank-user">
                                    <div class="user-avatar" style="background-color: ${data.avatarColor || 'var(--wc-blue)'}">${initial}</div>
                                    ${data.userName} ${isMe ? '<span style="font-size:0.7rem; background: var(--wc-red); color: white; padding:2px 6px; border-radius:6px; margin-left: 5px;">TÚ</span>' : ''}
                                </div>
                                <div class="rank-score">${data.score}</div>
                            </div>
                        `;
                        rank++;
                    });
                }, (error) => {
                    document.getElementById('leaderboard-container').innerHTML = '<p style="color:var(--text-muted); text-align:center;">Clasificación no disponible (requiere base de datos).</p>';
                });
            } catch(e) {
                document.getElementById('leaderboard-container').innerHTML = '<p style="color:var(--text-muted); text-align:center;">Modo sin conexión activo.</p>';
            }
        }

        lucide.createIcons();
    </script>
</body>
</html>
