<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bingo World Cup 26 | Interra-hub</title>
    
    <link rel="icon" type="image/png" href="interrahublogo.PNG">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;800&family=Teko:wght@500;700&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        /* =========================================
           PALETA OFICIAL WORLD CUP 26 Y DISEÑO
           ========================================= */
        :root {
            --wc-blue: #00529F;
            --wc-red: #E3003F;
            --wc-green: #00A651;
            --wc-purple: #662483;
            --wc-yellow: #FFC20E;
            --pitch-dark: #020617;
            --surface: rgba(15, 23, 42, 0.75);
            --primary: #ffffff;
            --text-muted: #94a3b8;
            --neon-glow: 0 0 20px rgba(227, 0, 63, 0.6);
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Sora', sans-serif; }

        /* Fondo estilo Estadio (Césped + Focos de luz) */
        body {
            background-color: var(--pitch-dark);
            background-image: 
                radial-gradient(circle at 10% 0%, rgba(255, 255, 255, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 90% 0%, rgba(255, 255, 255, 0.1) 0%, transparent 40%),
                linear-gradient(rgba(2, 6, 23, 0.9), rgba(2, 6, 23, 0.95)),
                repeating-linear-gradient(0deg, transparent, transparent 60px, rgba(255,255,255,0.02) 60px, rgba(255,255,255,0.02) 120px);
            color: var(--primary);
            min-height: 100vh;
            overflow-x: hidden;
            background-attachment: fixed;
        }

        /* Nav */
        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 1rem 5%; background: rgba(2, 6, 23, 0.85); backdrop-filter: blur(20px);
            border-bottom: 2px solid var(--wc-red); position: sticky; top: 0; z-index: 100;
            box-shadow: 0 4px 30px rgba(227, 0, 63, 0.2);
        }
        .btn-nav { background: transparent; color: var(--primary); border: none; cursor: pointer; display: flex; align-items: center; gap: 8px; font-weight: 600; transition: var(--transition); }
        .btn-nav:hover { color: var(--wc-yellow); transform: translateX(-5px); }
        .logo-wc { display: flex; align-items: center; gap: 10px; font-family: 'Teko', sans-serif; font-size: 2.2rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; }
        .logo-wc span { color: var(--wc-red); }

        #page-loader {
            position: fixed; inset: 0; background: var(--pitch-dark); z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center; transition: opacity 0.5s ease;
            background-image: radial-gradient(circle at center, #00529F 0%, var(--pitch-dark) 60%);
        }
        .loader-ball { width: 60px; height: 60px; animation: bounceBall 1s infinite alternate cubic-bezier(0.5, 0.05, 1, 0.5); }
        @keyframes bounceBall { from { transform: translateY(-50px) rotate(0deg); } to { transform: translateY(0) rotate(360deg); } }

        /* Layout Main */
        .game-container {
            max-width: 1400px; margin: 2rem auto; padding: 0 5%;
            display: grid; grid-template-columns: 1fr 400px; gap: 2rem;
        }

        @media (max-width: 1024px) {
            .game-container { grid-template-columns: 1fr; }
        }

        /* Tablero de Bingo */
        .board-section {
            background: var(--surface);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px;
            padding: 2.5rem;
            backdrop-filter: blur(15px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            position: relative;
            overflow: hidden;
        }

        /* Resplandor decorativo de fondo en el tablero */
        .board-section::before {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle at 50% 50%, rgba(0, 82, 159, 0.1), transparent 60%);
            z-index: 0; pointer-events: none;
        }

        .board-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 2rem; position: relative; z-index: 1; }
        .board-header h1 { font-family: 'Teko', sans-serif; font-size: 3.5rem; line-height: 0.9; text-transform: uppercase; margin-bottom: 5px; text-shadow: 0 4px 15px rgba(0,0,0,0.5);}
        .board-header p { color: var(--text-muted); font-size: 1rem; }
        
        .score-display {
            background: linear-gradient(135deg, rgba(227, 0, 63, 0.1), rgba(0, 82, 159, 0.1)); 
            border: 2px solid var(--wc-red);
            padding: 1rem 2rem; border-radius: 20px; text-align: center;
            box-shadow: var(--neon-glow);
        }
        .score-display span { display: block; font-size: 0.85rem; color: var(--primary); font-weight: 800; text-transform: uppercase; letter-spacing: 2px;}
        .score-display strong { font-size: 3rem; font-family: 'Teko', sans-serif; line-height: 1; color: var(--wc-yellow); text-shadow: 0 0 10px rgba(255, 194, 14, 0.5); }

        .bingo-grid {
            display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px;
            background: rgba(0,0,0,0.4); padding: 15px; border-radius: 20px;
            position: relative; z-index: 1; border: 1px solid rgba(255,255,255,0.05);
        }

        .bingo-cell {
            aspect-ratio: 1 / 1;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 14px;
            display: flex; justify-content: center; align-items: center; text-align: center;
            padding: 10px; cursor: pointer; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative; overflow: hidden;
            user-select: none;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
        }

        .bingo-cell:hover:not(.checked):not(.free-space) {
            background: rgba(255,255,255,0.1); transform: translateY(-4px) scale(1.02); border-color: var(--wc-blue);
            box-shadow: 0 10px 20px rgba(0, 82, 159, 0.3);
        }

        .bingo-cell.checked {
            background: linear-gradient(135deg, var(--wc-blue), var(--wc-red));
            border-color: transparent;
            box-shadow: 0 8px 25px rgba(227, 0, 63, 0.5);
            transform: scale(0.95);
        }

        .bingo-cell.checked::after {
            content: '⚽'; position: absolute; font-size: 3rem; opacity: 0.15; transform: rotate(-15deg);
        }

        .bingo-cell.free-space {
            background: linear-gradient(135deg, #FFC20E, #F7941E);
            color: #000; font-weight: 800; border: none; cursor: default;
            box-shadow: 0 0 20px rgba(255, 194, 14, 0.4);
        }

        .bingo-cell.winning-cell {
            animation: pulseWin 1.5s infinite;
        }

        @keyframes pulseWin {
            0% { box-shadow: 0 0 0 0 rgba(227, 0, 63, 0.8); border: 2px solid var(--wc-yellow); }
            70% { box-shadow: 0 0 0 20px rgba(227, 0, 63, 0); border: 2px solid var(--wc-yellow); }
            100% { box-shadow: 0 0 0 0 rgba(227, 0, 63, 0); border: 2px solid var(--wc-yellow); }
        }

        .cell-text {
            font-size: 0.85rem; font-weight: 600; z-index: 2; word-break: break-word; line-height: 1.3;
        }

        /* Leaderboard */
        .leaderboard-section {
            background: var(--surface); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px; padding: 2rem; backdrop-filter: blur(15px);
            display: flex; flex-direction: column; max-height: 850px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
        }

        .leaderboard-section h2 {
            font-family: 'Teko', sans-serif; font-size: 2.5rem; display: flex; align-items: center; gap: 10px;
            text-transform: uppercase; border-bottom: 2px solid rgba(255,255,255,0.05); padding-bottom: 1rem; margin-bottom: 1rem;
            color: var(--wc-yellow);
        }

        .table-container { flex: 1; overflow-y: auto; padding-right: 5px; }
        .table-container::-webkit-scrollbar { width: 6px; }
        .table-container::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }

        .rank-row {
            display: flex; align-items: center; padding: 1.2rem;
            background: rgba(255,255,255,0.02); border-radius: 16px; margin-bottom: 12px;
            transition: var(--transition); border: 1px solid rgba(255,255,255,0.05);
        }
        .rank-row:hover { background: rgba(255,255,255,0.06); border-color: rgba(255,255,255,0.1); transform: translateX(5px); }
        
        .rank-row.is-me { border-color: var(--wc-red); background: rgba(227, 0, 63, 0.1); box-shadow: 0 0 15px rgba(227, 0, 63, 0.2); }

        .rank-num { font-family: 'Teko', sans-serif; font-size: 1.8rem; font-weight: 700; width: 40px; color: var(--text-muted); text-align: center; }
        .rank-row:nth-child(1) .rank-num { color: #FFC20E; font-size: 2.2rem; text-shadow: 0 0 10px rgba(255,194,14,0.5); }
        .rank-row:nth-child(2) .rank-num { color: #E0E0E0; font-size: 2rem; }
        .rank-row:nth-child(3) .rank-num { color: #CD7F32; font-size: 1.9rem; }

        .rank-user { flex: 1; font-weight: 600; display: flex; align-items: center; gap: 12px; font-size: 1rem; }
        .user-avatar { width: 38px; height: 38px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 1rem; color: white; font-weight: 800; border: 2px solid rgba(255,255,255,0.2); }
        
        .rank-score { font-family: 'Teko', sans-serif; font-size: 2.2rem; font-weight: 700; color: var(--wc-green); text-shadow: 0 0 10px rgba(0, 166, 81, 0.3);}

        .btn-save {
            width: 100%; background: linear-gradient(135deg, var(--wc-blue), #003b73); color: var(--primary); border: none;
            padding: 1.2rem; border-radius: 16px; font-weight: 800; font-size: 1.1rem; margin-top: 1.5rem; letter-spacing: 1px;
            cursor: pointer; transition: var(--transition); display: flex; justify-content: center; align-items: center; gap: 10px;
            border: 1px solid rgba(255,255,255,0.1); position: relative; z-index: 1;
        }
        .btn-save:hover { transform: translateY(-3px); box-shadow: 0 15px 25px rgba(0, 82, 159, 0.4); border-color: var(--wc-blue); }

        /* Adaptaciones Móviles */
        @media (max-width: 768px) {
            .board-header { flex-direction: column; align-items: flex-start; gap: 20px; }
            .score-display { width: 100%; }
            .bingo-grid { gap: 6px; padding: 8px; }
            .bingo-cell { padding: 4px; border-radius: 8px; }
            .cell-text { font-size: 0.65rem; }
            .board-section { padding: 1.2rem; }
            .board-header h1 { font-size: 2.5rem; }
        }
    </style>
</head>
<body>

    <div id="page-loader">
        <svg class="loader-ball" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: var(--primary);">
            <circle cx="12" cy="12" r="10"></circle>
            <path d="M12 12l3.5 2M12 12l-3.5 2M12 12V7.5M12 2.5a9.5 9.5 0 0 1 7.5 4M12 21.5a9.5 9.5 0 0 1-7.5-4"></path>
        </svg>
        <p style="margin-top: 20px; font-family: 'Teko', sans-serif; font-size: 2rem; letter-spacing: 2px; color: var(--primary);">PREPARANDO EL CÉSPED...</p>
    </div>

    <nav>
        <button class="btn-nav" onclick="goBack()">
            <i data-lucide="arrow-left"></i> Volver
        </button>
        <div class="logo-wc">
            World Cup <span>26</span> Bingo
        </div>
        <div style="width: 80px;"></div> </nav>

    <div class="game-container">
        
        <div class="board-section">
            <div class="board-header">
                <div>
                    <h1>Tu Cartón Oficial</h1>
                    <p>Marca las casillas a medida que ocurran los eventos en el Mundial.</p>
                </div>
                <div class="score-display">
                    <span>Puntuación</span>
                    <strong id="my-score">0</strong>
                </div>
            </div>

            <div class="bingo-grid" id="bingo-board">
                </div>

            <button class="btn-save" id="btn-save-progress" onclick="saveProgress()">
                <i data-lucide="save"></i> GUARDAR MI PROGRESO
            </button>
        </div>

        <div class="leaderboard-section">
            <h2><i data-lucide="trophy"></i> Clasificación Global</h2>
            <p style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 1.5rem;">Compite contra los miembros de tu grupo de viaje. 10 pts por casilla, 50 pts por línea completada.</p>
            
            <div class="table-container" id="leaderboard-container">
                <div style="text-align: center; color: var(--text-muted); margin-top: 3rem;">
                    <i data-lucide="loader-2" style="animation: spin 2s linear infinite; width: 40px; height: 40px; color: var(--wc-blue);"></i>
                    <p style="margin-top: 15px; font-weight: 600;">Cargando clasificación...</p>
                </div>
            </div>
        </div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, collection, query, where, onSnapshot, orderBy } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDRkUJnDLzknFz3KOnPEm4UFsgf6R4z1Uk",
            authDomain: "interra26-22ecd.firebaseapp.com",
            projectId: "interra26-22ecd",
            storageBucket: "interra26-22ecd.firebasestorage.app",
            messagingSenderId: "960505222050",
            appId: "1:960505222050:web:a9943c6fec9532141f98fb"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // ==========================================
        // SISTEMA DE AUTODETECCIÓN INTELIGENTE DE ID
        // ==========================================
        const urlParams = new URLSearchParams(window.location.search);
        let tripId = urlParams.get('id');

        if (!tripId) {
            console.log("ID no encontrado en URL. Iniciando protocolo de rastreo...");
            // Si la URL no tiene ID, buscamos en el localStorage las llaves que usa viaje.html
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                if (key && key.startsWith('lastTipTime_')) {
                    tripId = key.replace('lastTipTime_', '');
                    break;
                }
                if (key && key.startsWith('financeTourDone_')) {
                    tripId = key.replace('financeTourDone_', '');
                    break;
                }
            }
        }

        if (!tripId) {
            // Si es imposible saber de dónde viene, lo asignamos a una sala general para que no explote
            tripId = "Mundial2026_SalaGlobal";
            console.warn("Se te ha asignado a la sala global por falta de ID de viaje.");
        }

        window.goBack = () => {
            if (tripId !== "Mundial2026_SalaGlobal") window.location.href = `viaje.html?id=${tripId}`;
            else window.location.href = 'panel.html';
        }

        // Banco de Eventos Posibles (Futbol 11 Style)
        const EVENT_POOL = [
            "Gol de chilena", "Penalti fallado", "Revisión larga del VAR", "0-0 al descanso",
            "Gol de falta directa", "Tarjeta roja directa", "Hat-trick de un jugador", "Gol en el descuento (+90')",
            "Tanda de penaltis", "Remontada en 2ª parte", "Gol anulado por fuera de juego", "Gol en propia puerta",
            "Entrenador amonestado", "Invasión de campo", "Lágrimas en el himno", "Golazo desde fuera del área",
            "España pasa de octavos", "Sustitución por lesión en 1ª parte", "Tiro al palo o larguero", "Empate en fase de grupos",
            "Gol de cabeza de un defensa", "Asistencia de tacón", "Jugador se quita la camiseta", "Parada a bocajarro",
            "Gol olímpico (córner directo)", "Partido con +5 goles", "Árbitro lesionado/cambiado", "Corte de luz o clima extremo",
            "Falso 9 anota", "Un equipo africano a Semis", "Cantada del portero", "Gol en los primeros 5 min"
        ];

        let currentUser = null;
        let userProfile = { nombre: 'Jugador', avatarColor: '#00529F' };
        let bingoBoard = []; // Array de 25 elementos
        let currentScore = 0;
        let isSaving = false;

        // 1. Inicialización de Autenticación
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                await loadUserProfile();
                await initializeGame();
                setupLeaderboardListener();
            } else {
                window.location.href = 'registro.html';
            }
        });

        // 2. Cargar Perfil de Usuario
        async function loadUserProfile() {
            try {
                const snap = await getDoc(doc(db, "usuarios", currentUser.uid));
                if (snap.exists()) {
                    const data = snap.data();
                    userProfile.nombre = data.nombre || currentUser.email.split('@')[0];
                    userProfile.avatarColor = data.avatarColor || '#00529F';
                }
            } catch (e) { console.error("Error cargando perfil", e); }
        }

        // 3. Iniciar o Cargar Tablero del Jugador
        async function initializeGame() {
            const docId = `${tripId}_${currentUser.uid}`;
            const boardRef = doc(db, "worldcup_bingo", docId);
            const docSnap = await getDoc(boardRef);

            if (docSnap.exists()) {
                // Si ya jugaba, cargar su cartón
                const data = docSnap.data();
                bingoBoard = data.board;
                currentScore = data.score || 0;
            } else {
                // Generar un cartón totalmente nuevo y único
                generateNewBoard();
                currentScore = 10; // 10 puntos de regalo por la casilla central
                await saveToFirebase(true); // Guardar silenciosamente el cartón recién creado
            }

            renderBoard();
            document.getElementById('page-loader').style.opacity = '0';
            setTimeout(() => document.getElementById('page-loader').style.display = 'none', 500);
        }

        function generateNewBoard() {
            // Mezclar aleatoriamente el banco de eventos
            let shuffled = [...EVENT_POOL].sort(() => 0.5 - Math.random());
            let selected = shuffled.slice(0, 24);
            
            bingoBoard = [];
            let eventIndex = 0;

            for (let i = 0; i < 25; i++) {
                if (i === 12) {
                    // Casilla central GRATIS y épica
                    bingoBoard.push({ id: 12, text: "LA COPA ES NUESTRA (GRATIS)", checked: true, isFree: true });
                } else {
                    bingoBoard.push({ id: i, text: selected[eventIndex], checked: false, isFree: false });
                    eventIndex++;
                }
            }
        }

        // 4. Renderizar Tablero e Interacciones
        function renderBoard() {
            const grid = document.getElementById('bingo-board');
            grid.innerHTML = '';

            bingoBoard.forEach((cell, index) => {
                const cellEl = document.createElement('div');
                cellEl.className = `bingo-cell ${cell.checked ? 'checked' : ''} ${cell.isFree ? 'free-space checked' : ''}`;
                cellEl.innerHTML = `<span class="cell-text">${cell.text}</span>`;
                
                if (!cell.isFree) {
                    cellEl.onclick = () => toggleCell(index, cellEl);
                }
                
                grid.appendChild(cellEl);
            });

            calculateScoreAndVisuals();
        }

        function toggleCell(index, element) {
            bingoBoard[index].checked = !bingoBoard[index].checked;
            
            if (bingoBoard[index].checked) {
                element.classList.add('checked');
            } else {
                element.classList.remove('checked');
                element.classList.remove('winning-cell');
            }

            calculateScoreAndVisuals();
            
            // Botón de guardar cambia a rojo indicando cambios no guardados
            const btn = document.getElementById('btn-save-progress');
            btn.style.background = 'var(--wc-red)';
            btn.style.color = 'white';
            btn.innerHTML = '<i data-lucide="alert-circle"></i> CAMBIOS SIN GUARDAR';
            lucide.createIcons();
        }

        // 5. Lógica de Puntos y Animaciones (Lineas y Bingo)
        function calculateScoreAndVisuals() {
            // Limpiar animaciones de línea anteriores
            document.querySelectorAll('.bingo-cell').forEach(el => el.classList.remove('winning-cell'));
            
            let linesCompleted = 0;
            let cellsChecked = 0;
            const winningIndices = new Set();

            // Check Filas
            for (let r = 0; r < 5; r++) {
                let rowChecked = true;
                for (let c = 0; c < 5; c++) {
                    if (!bingoBoard[r * 5 + c].checked) rowChecked = false;
                }
                if (rowChecked) {
                    linesCompleted++;
                    for (let c = 0; c < 5; c++) winningIndices.add(r * 5 + c);
                }
            }

            // Check Columnas
            for (let c = 0; c < 5; c++) {
                let colChecked = true;
                for (let r = 0; r < 5; r++) {
                    if (!bingoBoard[r * 5 + c].checked) colChecked = false;
                }
                if (colChecked) {
                    linesCompleted++;
                    for (let r = 0; r < 5; r++) winningIndices.add(r * 5 + c);
                }
            }

            // Check Diagonales
            let diag1 = true; let diag2 = true;
            for (let i = 0; i < 5; i++) {
                if (!bingoBoard[i * 5 + i].checked) diag1 = false;
                if (!bingoBoard[i * 5 + (4 - i)].checked) diag2 = false;
            }
            if (diag1) { linesCompleted++; for (let i = 0; i < 5; i++) winningIndices.add(i * 5 + i); }
            if (diag2) { linesCompleted++; for (let i = 0; i < 5; i++) winningIndices.add(i * 5 + (4 - i)); }

            // Aplicar pulso visual a las líneas ganadoras
            const cells = document.querySelectorAll('.bingo-cell');
            winningIndices.forEach(idx => cells[idx].classList.add('winning-cell'));

            // Calcular casillas totales marcadas
            bingoBoard.forEach(c => { if(c.checked) cellsChecked++; });

            // Puntuación: 10 pts por casilla, 50 pts extra por línea completada
            const oldScore = currentScore;
            currentScore = (cellsChecked * 10) + (linesCompleted * 50);
            
            // Pleno al 15 (Cartón lleno Bonus)
            if (cellsChecked === 25) currentScore += 250;

            document.getElementById('my-score').innerText = currentScore;

            // Disparar confeti oficial del Mundial si consigue una línea nueva
            if (currentScore > oldScore && oldScore !== 0 && linesCompleted > 0 && !isSaving) {
                shootConfetti();
            }
        }

        function shootConfetti() {
            confetti({ 
                particleCount: 150, 
                spread: 80, 
                origin: { y: 0.6 }, 
                colors: ['#00529F', '#E3003F', '#00A651', '#FFC20E'] 
            });
        }

        // 6. Guardado en Firebase
        window.saveProgress = async function() {
            if (isSaving) return;
            isSaving = true;
            const btn = document.getElementById('btn-save-progress');
            btn.innerHTML = '<i data-lucide="loader-2" style="animation: spin 2s linear infinite;"></i> GUARDANDO DATOS...';

            await saveToFirebase(false);

            btn.style.background = 'var(--wc-green)';
            btn.style.color = 'white';
            btn.style.borderColor = 'transparent';
            btn.innerHTML = '<i data-lucide="check-circle"></i> ESTADÍSTICAS ACTUALIZADAS';
            lucide.createIcons();
            
            // Volver al estado normal del botón
            setTimeout(() => {
                btn.style.background = '';
                btn.style.color = '';
                btn.style.borderColor = '';
                btn.innerHTML = '<i data-lucide="save"></i> GUARDAR MI PROGRESO';
                isSaving = false;
                lucide.createIcons();
            }, 2500);
        }

        async function saveToFirebase(isSilent) {
            const docId = `${tripId}_${currentUser.uid}`;
            const boardRef = doc(db, "worldcup_bingo", docId);
            
            try {
                await setDoc(boardRef, {
                    tripId: tripId,
                    uid: currentUser.uid,
                    userName: userProfile.nombre,
                    avatarColor: userProfile.avatarColor,
                    board: bingoBoard,
                    score: currentScore,
                    timestamp: new Date().getTime()
                }, { merge: true });
            } catch (error) {
                console.error("Error guardando en la nube", error);
                if(!isSilent) alert("Hubo un error al guardar. Revisa tu conexión de red.");
            }
        }

        // 7. Leaderboard en Tiempo Real
        function setupLeaderboardListener() {
            const bingoRef = collection(db, "worldcup_bingo");
            const q = query(bingoRef, where("tripId", "==", tripId), orderBy("score", "desc"));

            onSnapshot(q, (snapshot) => {
                const container = document.getElementById('leaderboard-container');
                container.innerHTML = '';

                if (snapshot.empty) {
                    container.innerHTML = `
                        <div style="text-align: center; color: var(--text-muted); margin-top: 2rem;">
                            <i data-lucide="users" style="width: 40px; height: 40px; opacity: 0.5; margin-bottom: 10px;"></i>
                            <p>Nadie ha guardado puntuaciones en este viaje todavía.</p>
                            <p style="font-size: 0.8rem; margin-top: 5px;">¡Sé el primero en guardar tu cartón!</p>
                        </div>`;
                    lucide.createIcons();
                    return;
                }

                let rank = 1;
                snapshot.forEach((doc) => {
                    const data = doc.data();
                    const isMe = data.uid === currentUser.uid;
                    const initial = data.userName ? data.userName.charAt(0).toUpperCase() : '?';

                    container.innerHTML += `
                        <div class="rank-row ${isMe ? 'is-me' : ''}">
                            <div class="rank-num">${rank}</div>
                            <div class="rank-user">
                                <div class="user-avatar" style="background-color: ${data.avatarColor || 'var(--wc-blue)'}">${initial}</div>
                                ${data.userName} ${isMe ? '<span style="font-size:0.7rem; background: var(--wc-red); color: white; padding:2px 6px; border-radius:10px; font-weight:800; margin-left: 5px;">TÚ</span>' : ''}
                            </div>
                            <div class="rank-score">${data.score}</div>
                        </div>
                    `;
                    rank++;
                });
            });
        }

        lucide.createIcons();

        // Estilos para la animación de carga incrustados vía JS
        const style = document.createElement('style');
        style.innerHTML = `@keyframes spin { 100% { transform: rotate(360deg); } }`;
        document.head.appendChild(style);
    </script>
</body>
</html>
